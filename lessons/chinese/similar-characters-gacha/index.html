<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>形近字扭蛋機</title>
  <style>
    :root {
      --ink: #18283f;
      --muted: #687892;
      --panel: rgba(255, 255, 255, .96);
      --cyan: #22d7e8;
      --magenta: #ff4fd8;
      --yellow: #ffd84b;
      --lime: #60e56f;
      --orange: #ff8a3d;
      --red: #f05267;
      --blue: #3677ff;
      --line: rgba(34, 215, 232, .45);
      --shadow: 0 8px 0 rgba(8, 15, 34, .22), 0 18px 46px rgba(8, 15, 34, .22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
      background:
        linear-gradient(90deg, rgba(34, 215, 232, .12) 1px, transparent 1px) 0 0 / 34px 34px,
        linear-gradient(rgba(255, 79, 216, .10) 1px, transparent 1px) 0 0 / 34px 34px,
        radial-gradient(circle at 18% 12%, rgba(34, 215, 232, .28), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(255, 79, 216, .25), transparent 26%),
        linear-gradient(135deg, #10172b 0%, #172642 54%, #201336 100%);
      overflow-x: hidden;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .hidden { display: none !important; }

    .topbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px clamp(14px, 3vw, 30px);
      color: #f8ffff;
      background: rgba(9, 15, 32, .78);
      border-bottom: 1px solid rgba(34, 215, 232, .35);
      backdrop-filter: blur(12px);
    }

    .home {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid rgba(34, 215, 232, .45);
      border-radius: 8px;
      color: #bffaff;
      font-weight: 900;
    }

    .brand {
      font-size: clamp(19px, 3vw, 28px);
      font-weight: 950;
      letter-spacing: 0;
      text-shadow: 0 0 16px rgba(34, 215, 232, .85);
    }

    .sound {
      min-width: 44px;
      min-height: 40px;
      border: 1px solid rgba(255, 79, 216, .62);
      border-radius: 8px;
      color: #fff;
      background: rgba(255, 79, 216, .16);
      font-weight: 900;
    }

    .shell {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 54px;
    }

    .machine-layout {
      display: grid;
      grid-template-columns: minmax(290px, .95fr) minmax(320px, 1.2fr);
      gap: 22px;
      align-items: stretch;
    }

    .cabinet, .question-panel, .result-panel {
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .cabinet {
      position: relative;
      min-height: 640px;
      padding: 18px;
      color: #fff;
      background: linear-gradient(180deg, rgba(20, 30, 61, .98), rgba(16, 18, 43, .98));
      overflow: hidden;
    }

    .cabinet::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 2px solid rgba(255, 79, 216, .52);
      border-radius: 8px;
      pointer-events: none;
      box-shadow: inset 0 0 28px rgba(34, 215, 232, .22);
    }

    .neon-title {
      position: relative;
      z-index: 1;
      margin: 0 0 14px;
      padding: 12px;
      border: 3px solid var(--cyan);
      border-radius: 8px;
      color: #caffff;
      background: rgba(0, 0, 0, .28);
      text-align: center;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.05;
      font-weight: 950;
      text-shadow: 0 0 14px rgba(34, 215, 232, .95);
      box-shadow: 0 0 18px rgba(34, 215, 232, .62);
    }

    .gacha-window {
      position: relative;
      z-index: 1;
      min-height: 380px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 255, 255, .18);
      border-radius: 8px;
      background: radial-gradient(circle at center, #fff47a 0 18%, #ffbe35 48%, #fb6b5b 100%);
      overflow: hidden;
    }

    .dome {
      position: relative;
      width: min(330px, 80vw);
      height: 330px;
      overflow: hidden;
      border-radius: 8px;
    }

    .machine-photo {
      position: absolute;
      z-index: 2;
      left: 50%;
      top: 0;
      width: auto;
      max-width: none;
      height: 330px;
      transform: translateX(-50%);
      filter: saturate(1.05) contrast(1.04);
    }

    .machine-balls-photo {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: 0;
      width: auto;
      max-width: none;
      height: 330px;
      clip-path: ellipse(39% 33% at 50% 34%);
      transform: translateX(-50%);
      transform-origin: 50% 34%;
      filter: saturate(1.14) contrast(1.06);
      pointer-events: none;
    }

    .handle-overlay {
      position: absolute;
      z-index: 5;
      left: 50%;
      top: 234px;
      width: 62px;
      height: 62px;
      border: 5px solid #e9eef2;
      border-radius: 50%;
      background: radial-gradient(circle at 34% 28%, #ffffff 0 7%, #b9c3ca 8% 44%, #67727b 45% 53%, #e8edf0 54% 100%);
      box-shadow: 0 3px 8px rgba(18, 22, 31, .42), inset 0 2px 4px rgba(255, 255, 255, .72);
      transform: translateX(-50%);
      transform-origin: 50% 50%;
      pointer-events: none;
    }

    .handle-overlay::after {
      content: "";
      position: absolute;
      left: 7px;
      right: 7px;
      top: 23px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff, #9ba6ad 58%, #69747c);
      box-shadow: 0 1px 2px rgba(18, 22, 31, .36);
    }

    .base {
      position: absolute;
      left: 54px;
      right: 54px;
      bottom: 0;
      height: 108px;
      border: 7px solid #26364e;
      border-radius: 8px 8px 18px 18px;
      background: linear-gradient(180deg, #ff5b91, #d93378);
      box-shadow: 0 9px 0 rgba(13, 21, 45, .32);
      opacity: 0;
    }

    .knob {
      position: absolute;
      left: 50%;
      top: 34px;
      width: 66px;
      height: 66px;
      display: grid;
      place-items: center;
      border: 7px solid #26364e;
      border-radius: 50%;
      color: #203150;
      background: #d9e9ff;
      font-weight: 950;
      transform: translateX(-50%);
      transform-origin: 50% 50%;
    }

    .tray {
      position: absolute;
      left: 50%;
      bottom: 14px;
      width: 100px;
      height: 28px;
      border: 5px solid #26364e;
      border-radius: 999px;
      background: #fff4bf;
      transform: translateX(-50%);
    }

    .drop-capsule {
      position: absolute;
      z-index: 6;
      left: 50%;
      bottom: 40px;
      width: 58px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, .92);
      border-radius: 999px;
      background:
        radial-gradient(circle at 30% 22%, rgba(255, 255, 255, .92), rgba(255, 255, 255, .24) 22%, transparent 44%),
        linear-gradient(90deg, #ffdf42 0 50%, #45ddeb 50%);
      box-shadow: inset 0 -9px 14px rgba(0, 0, 0, .16), 0 7px 12px rgba(8, 15, 34, .25);
      opacity: 0;
      transform: translate(-50%, -54px) scale(.64) rotate(-28deg);
      pointer-events: none;
    }

    .drawing .handle-overlay {
      animation: knobTurn .72s cubic-bezier(.18, .82, .24, 1.04) both;
    }

    .drawing .machine-balls-photo {
      animation: photoBallShuffle 1.35s cubic-bezier(.36, 0, .18, 1) both;
    }

    .drawing .drop-capsule {
      animation: capsuleRollOut .9s cubic-bezier(.2, .75, .2, 1.05) .62s both;
    }

    .dispensed .drop-capsule {
      opacity: 1;
      transform: translate(8%, 18px) scale(1) rotate(360deg);
    }

    .drawing .base {
      animation: basePulse 1.15s ease-in-out both;
    }

    .start-row {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .setup-panel {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(34, 215, 232, .38);
      border-radius: 8px;
      background: rgba(7, 16, 35, .58);
      box-shadow: inset 0 0 18px rgba(34, 215, 232, .08);
    }

    .setup-group {
      display: grid;
      gap: 7px;
    }

    .setup-label {
      color: #caffff;
      font-size: 13px;
      font-weight: 950;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .choice {
      min-height: 38px;
      padding: 0 8px;
      border: 1px solid rgba(255, 255, 255, .24);
      border-radius: 8px;
      color: #eafcff;
      background: rgba(255, 255, 255, .08);
      font-size: 14px;
      font-weight: 950;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }

    .choice:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 216, 75, .7);
    }

    .choice.active {
      color: #10172b;
      border-color: rgba(255, 255, 255, .84);
      background: linear-gradient(90deg, var(--cyan), var(--yellow));
      box-shadow: 0 0 16px rgba(34, 215, 232, .32);
    }

    .primary, .secondary {
      min-height: 52px;
      padding: 0 18px;
      border-radius: 8px;
      font-weight: 950;
      transition: transform .16s ease, box-shadow .16s ease;
    }

    .primary {
      border: 1px solid rgba(34, 215, 232, .7);
      color: #0d1730;
      background: linear-gradient(90deg, var(--cyan), var(--yellow));
      box-shadow: 0 7px 0 rgba(5, 10, 24, .28), 0 0 20px rgba(34, 215, 232, .4);
    }

    .secondary {
      border: 1px solid rgba(255, 79, 216, .5);
      color: #fff;
      background: rgba(255, 79, 216, .18);
    }

    .primary:hover, .secondary:hover {
      transform: translateY(-2px);
    }

    .question-panel {
      position: relative;
      min-height: 640px;
      padding: clamp(18px, 3vw, 28px);
      color: #eefcff;
      background:
        linear-gradient(180deg, rgba(12, 23, 51, .98), rgba(22, 16, 48, .98)),
        #111b36;
      overflow: hidden;
      isolation: isolate;
    }

    .question-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(rgba(255, 255, 255, .045) 50%, transparent 50%) 0 0 / 100% 6px,
        radial-gradient(circle at 20% 15%, rgba(34, 215, 232, .22), transparent 30%),
        radial-gradient(circle at 85% 10%, rgba(255, 79, 216, .20), transparent 28%);
      opacity: .9;
    }

    .arena-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .mission-title {
      margin: 0;
      color: #fff;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.05;
      font-weight: 950;
      text-shadow: 0 0 14px rgba(34, 215, 232, .85);
    }

    .combo {
      min-width: 96px;
      min-height: 48px;
      display: grid;
      place-items: center;
      padding: 7px 10px;
      border: 2px solid rgba(255, 216, 75, .72);
      border-radius: 8px;
      color: #fff7c7;
      background: rgba(255, 138, 61, .18);
      font-size: 14px;
      font-weight: 950;
      text-align: center;
      box-shadow: 0 0 18px rgba(255, 216, 75, .26);
    }

    .combo strong {
      display: block;
      font-size: 23px;
      line-height: 1;
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
    }

    .progress {
      position: relative;
      height: 22px;
      overflow: hidden;
      border: 2px solid rgba(34, 215, 232, .55);
      border-radius: 999px;
      background: rgba(0, 0, 0, .34);
      box-shadow: inset 0 0 12px rgba(0, 0, 0, .42);
    }

    .progress::before {
      content: "MISSION";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, .76);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 0;
      pointer-events: none;
    }

    .progress span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--magenta), var(--yellow));
      transition: width .25s ease;
      box-shadow: 0 0 16px rgba(34, 215, 232, .72);
    }

    .score, .stars {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 8px;
      color: #f7fbff;
      border: 1px solid rgba(34, 215, 232, .42);
      background: rgba(255, 255, 255, .09);
      font-weight: 950;
      white-space: nowrap;
    }

    .stars { color: #ffe37a; }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tag {
      padding: 7px 10px;
      border-radius: 8px;
      color: #fff;
      background: #20395e;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 0 13px rgba(34, 215, 232, .18);
    }

    .tag.hot { background: var(--red); }
    .tag.mode { background: var(--blue); }

    .question-box {
      position: relative;
      min-height: 190px;
      display: grid;
      align-content: center;
      gap: 10px;
      margin: 14px 0;
      padding: clamp(18px, 3vw, 28px);
      border: 3px solid rgba(34, 215, 232, .62);
      border-radius: 8px;
      color: #f7fbff;
      background:
        linear-gradient(rgba(255, 255, 255, .045) 50%, transparent 50%) 0 0 / 100% 7px,
        radial-gradient(circle at 12% 16%, rgba(96, 229, 111, .14), transparent 28%),
        linear-gradient(135deg, rgba(18, 40, 76, .98), rgba(27, 18, 60, .98));
      box-shadow: inset 0 0 24px rgba(34, 215, 232, .18), 0 0 18px rgba(34, 215, 232, .20);
    }

    .question-box::before {
      content: "TARGET LOCK";
      position: absolute;
      top: 10px;
      right: 12px;
      color: rgba(255, 216, 75, .9);
      font-size: 12px;
      font-weight: 950;
    }

    .prompt {
      margin: 0;
      color: #a9f8ff;
      font-size: 18px;
      line-height: 1.55;
      font-weight: 800;
    }

    .sentence {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.35;
      font-weight: 950;
      letter-spacing: 0;
      text-shadow: 0 0 12px rgba(255, 255, 255, .18);
    }

    .blank {
      display: inline-block;
      min-width: 1.8em;
      padding: 0 4px;
      color: #fff;
      border-bottom: 5px solid var(--yellow);
      text-shadow: 0 0 16px rgba(255, 79, 216, .9);
      text-align: center;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .answer {
      position: relative;
      min-height: 78px;
      padding: 14px 14px 14px 56px;
      border: 2px solid rgba(34, 215, 232, .42);
      border-radius: 8px;
      color: #f7fbff;
      background: linear-gradient(135deg, rgba(31, 53, 94, .95), rgba(31, 22, 66, .95));
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 950;
      box-shadow: 0 6px 0 rgba(3, 8, 23, .38), inset 0 0 18px rgba(34, 215, 232, .08);
      text-align: left;
    }

    .answer::before {
      content: none;
      display: none;
      position: absolute;
      left: 14px;
      top: 50%;
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #10172b;
      background: var(--yellow);
      font-size: 16px;
      transform: translateY(-50%);
    }

    .answer:hover {
      border-color: var(--yellow);
      background: linear-gradient(135deg, rgba(34, 215, 232, .34), rgba(255, 79, 216, .22));
      box-shadow: 0 6px 0 rgba(3, 8, 23, .38), 0 0 18px rgba(255, 216, 75, .32);
    }

    .answer.correct {
      color: #073417;
      border-color: #2eb85f;
      background: #98f09f;
      animation: pop .22s ease-out;
    }

    .answer.wrong {
      color: #fff;
      border-color: #b8273a;
      background: var(--red);
    }

    .feedback {
      min-height: 86px;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 8px;
      color: #fff8d9;
      border: 1px solid rgba(255, 216, 75, .45);
      background: rgba(255, 138, 61, .16);
      line-height: 1.6;
      font-weight: 850;
      box-shadow: inset 0 0 18px rgba(255, 216, 75, .08);
    }

    .feedback strong { color: #ffe37a; }

    .next-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .result-panel {
      padding: clamp(22px, 4vw, 38px);
      text-align: center;
      color: #f7fbff;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 216, 75, .20), transparent 32%),
        linear-gradient(180deg, rgba(12, 23, 51, .98), rgba(31, 18, 58, .98));
    }

    .badge-case {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin: 20px 0;
    }

    .badge {
      width: 118px;
      min-height: 118px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 6px;
      padding: 10px;
      border: 3px solid #d8e3ef;
      border-radius: 8px;
      background: #f4f7fb;
      color: #8792a5;
      font-weight: 950;
    }

    .badge.earned {
      color: #583600;
      border-color: #ffbf2f;
      background: linear-gradient(180deg, #fff6c7, #ffd55d);
      box-shadow: 0 8px 0 rgba(24, 40, 63, .13);
    }

    .badge span:first-child {
      font-size: 42px;
      line-height: 1;
    }

    .result-title {
      margin: 0 0 8px;
      font-size: clamp(34px, 6vw, 58px);
      line-height: 1.05;
      color: #fff;
      text-shadow: 0 0 16px rgba(34, 215, 232, .72);
    }

    .result-score {
      margin: 0;
      color: #ffe37a;
      font-size: clamp(48px, 9vw, 86px);
      font-weight: 950;
      text-shadow: 0 0 18px rgba(255, 216, 75, .42);
    }

    .result-text {
      max-width: 640px;
      margin: 12px auto 0;
      color: #cde9f4;
      font-size: 18px;
      line-height: 1.65;
      font-weight: 750;
    }

    @keyframes knobTurn {
      0% { transform: translateX(-50%) rotate(0deg); }
      72% { transform: translateX(-50%) rotate(390deg); }
      100% { transform: translateX(-50%) rotate(360deg); }
    }

    @keyframes photoBallShuffle {
      0%, 100% { transform: translateX(-50%) translate(0, 0) rotate(0deg) scale(1); }
      14% { transform: translateX(-50%) translate(7px, -5px) rotate(4deg) scale(1.025); }
      30% { transform: translateX(-50%) translate(-8px, 5px) rotate(-4.5deg) scale(1.022); }
      48% { transform: translateX(-50%) translate(6px, 4px) rotate(3.2deg) scale(1.018); }
      66% { transform: translateX(-50%) translate(-5px, -3px) rotate(-2.6deg) scale(1.014); }
      84% { transform: translateX(-50%) translate(2px, 1px) rotate(1deg) scale(1.006); }
    }

    @keyframes capsuleRollOut {
      0% { opacity: 0; transform: translate(-50%, -62px) scale(.55) rotate(-38deg); }
      24% { opacity: 1; transform: translate(-50%, -20px) scale(.78) rotate(36deg); }
      52% { opacity: 1; transform: translate(-50%, 12px) scale(1) rotate(142deg); }
      74% { opacity: 1; transform: translate(-26%, 20px) scale(1) rotate(238deg); }
      100% { opacity: 1; transform: translate(8%, 18px) scale(1) rotate(360deg); }
    }

    @keyframes basePulse {
      0%, 100% { filter: brightness(1); }
      45% { filter: brightness(1.22); }
    }

    @keyframes pop {
      50% { transform: scale(1.04); }
    }

    @media (max-width: 880px) {
      .machine-layout { grid-template-columns: 1fr; }
      .cabinet, .question-panel { min-height: auto; }
      .gacha-window { min-height: 350px; }
    }

    @media (max-width: 620px) {
      .topbar { flex-wrap: wrap; }
      .brand { order: -1; width: 100%; text-align: center; }
      .hud { grid-template-columns: 1fr 1fr; }
      .progress { grid-column: 1 / -1; }
      .answers { grid-template-columns: 1fr; }
      .sentence { font-size: 28px; }
    }

    /* Full-screen game stage based on the approved visual direction. */
    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #171717;
    }

    .topbar { display: none; }

    .shell {
      width: min(1280px, 100%);
      padding: 0;
    }

    .machine-layout {
      position: relative;
      display: block;
      min-height: 0;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 18px;
      background: url("assets/quiz-energy-battle-landscape.png") center / cover no-repeat;
      box-shadow: 0 18px 56px rgba(0, 0, 0, .48);
    }

    .cabinet {
      position: absolute;
      z-index: 1;
      inset: 0;
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
    }

    .cabinet::before,
    .cabinet .neon-title,
    .cabinet .gacha-window,
    .cabinet .start-row {

{ mode: "讀音判讀", category: "讀音", difficulty: "五年級", focus: "同音字", prompt: "下列哪一組「 」中的國字，讀音「完全相同」？", answer: "③ 嚎「啕」大哭／「陶」醉其中", options: ["① 偵「辦」案件／爭「辯」是非", "② 走「遍」天下／詐「騙」集團", "③ 嚎「啕」大哭／「陶」醉其中", "④ 損兵「折」將／過河「拆」橋"], sentence: "請找出前後兩個字讀音完全相同的一組。", explain: "「啕」和「陶」都讀作ㄊㄠˊ，所以答案是③。" },

{ mode: "讀音判讀", category: "讀音", difficulty: "六年級", focus: "塞", prompt: "下列文句「 」中的字，哪一個讀音與其他三者「不同」？", answer: "④ 他在邊「塞」地帶從事研究工作多年。", options: ["① 排水孔要定期清理，以免淤「塞」積水。", "② 他在球賽中為了敷衍「塞」責，表現得很不理想。", "③ 老子曾說：「大巧若拙，大辯若訥，大盈若沖，其用不「塞」」。", "④ 他在邊「塞」地帶從事研究工作多年。"], sentence: "請判斷「塞」在不同文句中的讀音。", explain: "淤塞、塞責、其用不塞的「塞」多讀作ㄙㄜˋ；邊塞的「塞」讀作ㄙㄞˋ，所以答案是④。", reference: "參考 111 年六年級第 2 題" },

{ mode: "讀音判讀", category: "讀音", difficulty: "六年級", focus: "咀剖券氛", prompt: "下列選項中的「咀、剖、券、氛」字，哪一個對應注音是「正確」的？", answer: "② 「剖」析詳盡：ㄆㄡˇ", options: ["① 細細「咀」嚼：ㄗㄨˇ", "② 「剖」析詳盡：ㄆㄡˇ", "③ 勝「券」在握：ㄐㄩㄢˋ", "④ 寧靜「氛」圍：ㄈㄣˋ"], sentence: "請找出注音正確的一項。", explain: "剖析的「剖」讀作ㄆㄡˇ；咀讀ㄐㄩˇ，券讀ㄑㄩㄢˋ，氛讀ㄈㄣ，所以答案是②。", reference: "參考 113 年六年級第 1、2 題" },
{ mode: "讀音判讀", category: "讀音", difficulty: "六年級", focus: "毀", prompt: "下列哪一個選項中的字，讀音與「毀」相同？", answer: "③ 不「毀」一兵一卒", options: ["① 自慚形「穢」", "② 萬劫不「復」", "③ 不「毀」一兵一卒", "④ 莊嚴「宏」偉"], sentence: "請找出讀音與「毀」相同的選項。", explain: "毀讀ㄏㄨㄟˇ，第三選項同字同音，所以答案是③。", reference: "根據六年級常考讀音設計" },
{ mode: "讀音判讀", category: "讀音", difficulty: "六年級", focus: "同音字", prompt: "下列哪一組「 」中的字，前後讀音「完全相同」？", answer: "③ 班門弄「斧」／破「釜」沉舟", options: ["① 小路蜿「蜒」／蜻「蜓」點水", "② 臉部腫「脹」／水「漲」船高", "③ 班門弄「斧」／破「釜」沉舟", "④ 自甘「墮」落／天花亂「墜」"], sentence: "請找出前後讀音完全相同的一組。", explain: "斧、釜都讀ㄈㄨˇ，所以答案是③。", reference: "參考 114 年五年級第 1 題" },
{ mode: "讀音判讀", category: "讀音", difficulty: "六年級", focus: "湛／勘", prompt: "下列哪一個選項「 」中的字，讀音與其他三個「不同」？", answer: "④ 「勘」查地形", options: ["① 技術精「湛」", "② 技藝「湛」深", "③ 「湛」藍天空", "④ 「勘」查地形"], sentence: "請判斷「湛／勘」在不同詞語中的讀音。", explain: "湛讀ㄓㄢˋ；勘讀ㄎㄢ，所以答案是④。", reference: "參考 114 年五年級第 3 題設計" }
    ];

    // The shared question-bank file is the primary source for both the game and review page.
    const questions = window.QUESTION_BANK || legacyQuestions;

    let round = [];
    let index = 0;
    let score = 0;
    let stars = 0;
    let streak = 0;
    let bestStreak = 0;
    let correctCount = 0;
    let attemptCount = 0;
    let currentQuestion = null;
    let answered = false;
    let audioContext = null;
    let soundOn = true;
    let selectedType = "混合";
    let selectedDifficulty = "基礎";

    const $ = id => document.getElementById(id);
    const shuffle = list => [...list].sort(() => Math.random() - .5);

    function getQuestionType(q) {
      if (q.category === "多音字" || q.category === "讀音") return "多音字";
      return "形近字";
    }

    function getDifficultyLevel(q) {
      if (q.difficulty === "三年級" || q.difficulty === "基礎") return "基礎";
      if (q.difficulty === "四年級" || q.difficulty === "進階") return "進階";
      if (q.difficulty === "五年級" || q.difficulty === "六年級" || q.difficulty === "挑戰") return "挑戰";
      return "進階";
    }

    function buildRound() {
      const byType = selectedType === "混合"
        ? questions
        : questions.filter(q => getQuestionType(q) === selectedType);
      const exact = byType.filter(q => getDifficultyLevel(q) === selectedDifficulty);
      const source = exact.length >= 10 ? exact : byType;
      return shuffle(source.length ? source : questions).slice(0, 10);
    }

    function updateSetupButtons() {
      document.querySelectorAll("[data-type]").forEach(button => {
        button.classList.toggle("active", button.dataset.type === selectedType);
      });
      document.querySelectorAll("[data-difficulty]").forEach(button => {
        button.classList.toggle("active", button.dataset.difficulty === selectedDifficulty);
      });
    }

    function initAudio() {
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      if (audioContext.state === "suspended") audioContext.resume();
    }

    function tone(freq, duration = .1, type = "sine", delay = 0) {
      if (!soundOn || !audioContext) return;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      const now = audioContext.currentTime + delay;
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(.075, now);
      gain.gain.exponentialRampToValueAtTime(.001, now + duration);
      osc.connect(gain).connect(audioContext.destination);
      osc.start(now);
      osc.stop(now + duration);
    }

    function playSound(name) {
      if (name === "draw") {
        tone(190, .08, "square");
        tone(260, .08, "square", .1);
        tone(330, .12, "square", .2);
      }
      if (name === "right") {
        tone(523, .1);
        tone(659, .12, "triangle", .1);
        tone(784, .18, "triangle", .22);
      }
      if (name === "wrong") {
        tone(180, .18, "sawtooth");
        tone(120, .26, "sawtooth", .12);
      }
      if (name === "finish") {
        tone(392, .12, "triangle");
        tone(523, .12, "triangle", .12);
        tone(659, .2, "triangle", .24);
      }
    }

    function startGame() {
      $("gameArea").classList.remove("playing");
      updateSetupButtons();
      round = buildRound();
      index = 0;
      score = 0;
      stars = 0;
      streak = 0;
      bestStreak = 0;
      correctCount = 0;
      attemptCount = 0;
      $("combo").dataset.bonus = "";
      $("resultPanel").classList.add("hidden");
      $("gameArea").classList.remove("hidden");
      updateHud();
      setReady();
    }

    function setReady() {
      answered = true;
      $("questionPanel").classList.remove("active");
      $("cabinet").classList.remove("drawing");
      $("cabinet").classList.remove("dispensed");
      $("modeTag").textContent = "準備抽題";
      $("countTag").textContent = `第 ${index + 1} / 10 題`;
      $("prompt").textContent = `目前題庫：${selectedType} / ${selectedDifficulty}`;
      $("sentence").innerHTML = "選好題型與難度後，按下扭蛋按鈕抽出題目。";
      $("answers").innerHTML = "";
      $("feedback").classList.add("hidden");
      $("nextButton").classList.add("hidden");
      $("drawButton").disabled = false;
    }

    function drawQuestion() {
      initAudio();
      playSound("draw");
      const q = round[index];
      const cabinet = $("cabinet");
      $("questionPanel").classList.remove("active");
      cabinet.classList.remove("drawing");
      cabinet.classList.remove("dispensed");
      void cabinet.offsetWidth;
      cabinet.classList.add("drawing");
      $("drawButton").disabled = true;
      $("modeTag").textContent = "扭蛋轉動中";
      $("prompt").textContent = "扭蛋正在旋轉，看看會掉出哪一顆題目球。";
      $("sentence").innerHTML = "球落到出口後，題目就會出現。";
      $("answers").innerHTML = "";
      $("feedback").classList.add("hidden");
      $("nextButton").classList.add("hidden");
      setTimeout(renderQuestion, 1600);
    }

    function renderQuestion() {
      const q = round[index];
      currentQuestion = q;
      $("gameArea").classList.add("playing");
      $("cabinet").classList.remove("drawing");
      $("cabinet").classList.add("dispensed");
      $("questionPanel").classList.add("active");
      answered = false;
      $("modeTag").textContent = q.mode;
      $("countTag").textContent = `第 ${index + 1} / 10 題`;
      $("prompt").textContent = q.prompt || "依照句子的意思，選出最適合的字。";
      $("sentence").innerHTML = q.sentence.includes("＿")
        ? q.sentence.replace("＿", '<span class="blank">?</span>')
        : q.sentence;
      $("answers").innerHTML = "";
      $("feedback").classList.add("hidden");
      $("nextButton").classList.add("hidden");

      q.options.forEach((option, optionIndex) => {
        const button = document.createElement("button");
        button.className = "answer";
        button.textContent = option;
        button.onclick = () => chooseAnswer(button, option, q);
        $("answers").appendChild(button);
      });
    }

    function chooseAnswer(button, option, q) {
      if (answered) return;
      answered = true;
      const acceptedList = q.acceptedAnswers || [q.displayAnswer || q.answer];
      const accepted = acceptedList.join("、");
      const correct = acceptedList.includes(option);
      attemptCount += 1;
      if (correct) correctCount += 1;
      document.querySelectorAll(".answer").forEach(item => {
        item.disabled = true;
        if (acceptedList.includes(item.textContent)) item.classList.add("correct");
      });

      if (correct) {
        streak += 1;
        const comboBonus = Math.max(0, streak - 1) * 2;
        score += 10 + comboBonus;
        $("combo").dataset.bonus = comboBonus ? `+${comboBonus}` : "";
        bestStreak = Math.max(bestStreak, streak);
        if (streak % 3 === 0) stars += 1;
        button.classList.add("correct");
        playSound("right");
        $("feedback").innerHTML = `答對了！<strong>${accepted}</strong> 用在這裡最合適。${q.explain}`;
      } else {
        streak = 0;
        $("combo").dataset.bonus = "";
        button.classList.add("wrong");
        playSound("wrong");
        $("feedback").innerHTML = `再想想看。這題答案是 <strong>${accepted}</strong>。${q.explain}`;
      }

      updateHud();
      $("feedback").classList.remove("hidden");
      $("nextButton").textContent = index === round.length - 1 ? "看結果" : "下一題";
      $("nextButton").classList.remove("hidden");
    }

    function updateHud() {
      $("score").textContent = score;
      $("stars").textContent = stars;
      $("combo").textContent = streak;
      $("accuracy").textContent = `${correctCount}/${round.length || 10}`;
      $("progressBar").style.width = `${index / 10 * 100}%`;
    }

    function nextQuestion() {
      if (index === round.length - 1) {
        finishGame();
        return;
      }
      index += 1;
      updateHud();
      drawQuestion();
    }

    function finishGame() {
      playSound("finish");
      $("progressBar").style.width = "100%";
      $("gameArea").classList.add("hidden");
      $("resultPanel").classList.remove("hidden");
      $("finalScore").textContent = score;

      $("badgeBronze").classList.toggle("earned", score >= 50);
      $("badgeSilver").classList.toggle("earned", score >= 80);
      $("badgeGold").classList.toggle("earned", score === 100);
      $("badgeCombo").classList.toggle("earned", bestStreak >= 3);

      if (score === 100) {
        $("resultTitle").textContent = "形近字滿分高手";
        $("resultText").textContent = "太漂亮了！你能在句子裡分辨細節，已經很像國語小偵探。";
      } else if (score >= 80) {
        $("resultTitle").textContent = "通過挑戰";
        $("resultText").textContent = "表現穩定，接下來可以增加找錯別字或限時題。";
      } else {
        $("resultTitle").textContent = "再抽幾顆就更熟";
        $("resultText").textContent = "形近字需要慢慢看字形和句意，錯題提示可以再讀一次。";
      }
    }

    $("drawButton").onclick = drawQuestion;
    $("cabinet").onclick = event => {
      if (event.target.closest("button, a") || $("drawButton").disabled) return;
      drawQuestion();
    };
    document.querySelector(".start-row").onclick = event => event.stopPropagation();
    $("cabinet").onclick = null;
    document.querySelector(".next-row").append($("restartButton"));

    const statusBar = document.querySelector(".hud");
    statusBar.append(document.querySelector(".tag-row"));
    const reportButton = document.createElement("button");
    reportButton.type = "button";
    reportButton.className = "report-button";
    reportButton.textContent = "錯題回報";
    statusBar.append(reportButton);

    const reportModal = document.createElement("div");
    reportModal.className = "report-modal";
    reportModal.innerHTML = `
      <div class="report-dialog" role="dialog" aria-modal="true" aria-labelledby="reportTitle">
        <h2 id="reportTitle">錯題回報</h2>
        <p class="report-question" id="reportQuestion"></p>
        <textarea id="reportNote" placeholder="請寫下你發現的問題，例如：正確答案應為哪一項？"></textarea>
        <div class="report-actions">
          <button class="report-cancel" type="button">取消</button>
          <button class="report-submit" type="button">儲存並複製回報</button>
        </div>
      </div>`;
    document.body.append(reportModal);

    function closeReport() {
      reportModal.classList.remove("open");
    }

    function reportText() {
      const q = currentQuestion;
      return [
        "國語形近字能量戰錯題回報",
        `題目：${q.prompt}`,
        `內容：${q.sentence}`,
        `選項：${q.options.join(" / ")}`,
        `目前答案：${q.answer}`,
        `回報說明：${$("reportNote").value.trim() || "未填寫"}`
      ].join("\n");
    }

    reportButton.onclick = () => {
      if (!currentQuestion) return;
      $("reportQuestion").textContent = `${currentQuestion.prompt} ${currentQuestion.sentence}`;
      $("reportNote").value = "";
      reportModal.classList.add("open");
    };
    reportModal.querySelector(".report-cancel").onclick = closeReport;
    reportModal.querySelector(".report-submit").onclick = async () => {
      const report = reportText();
      const reports = JSON.parse(localStorage.getItem("similarCharactersGachaReports") || "[]");
      reports.push({ report, createdAt: new Date().toISOString() });
      localStorage.setItem("similarCharactersGachaReports", JSON.stringify(reports));
      try { await navigator.clipboard.writeText(report); } catch { /* Copy is unavailable in some local-file browsers. */ }
      closeReport();
      alert("錯題回報已儲存，回報內容也已嘗試複製。");
    };

    $("nextButton").onclick = nextQuestion;
    $("restartButton").onclick = startGame;
    $("againButton").onclick = startGame;
    document.querySelectorAll("[data-type]").forEach(button => {
      button.onclick = () => {
        selectedType = button.dataset.type;
        startGame();
      };
    });
    document.querySelectorAll("[data-difficulty]").forEach(button => {
      button.onclick = () => {
        selectedDifficulty = button.dataset.difficulty;
        startGame();
      };
    });
    $("soundButton").onclick = () => {
      initAudio();
      soundOn = !soundOn;
      $("soundButton").textContent = soundOn ? "音效" : "靜音";
      if (soundOn) tone(660, .12);
    };

    startGame();
  </script>
</body>
</html>
