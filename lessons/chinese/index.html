<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>國語學習基地</title>
  <style>
    :root {
      --ink: #26364e;
      --muted: #68758a;
      --coral: #ef6f61;
      --blue: #3977b8;
      --green: #3f9a71;
      --purple: #7561b8;
      --paper: #fff9e9;
      --line: #dce4ed;
      --shadow: 0 8px 0 rgba(38, 54, 78, .14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(239, 111, 97, .16) 0 6px, transparent 7px),
        radial-gradient(circle at 86% 22%, rgba(63, 154, 113, .16) 0 7px, transparent 8px),
        linear-gradient(90deg, rgba(57, 119, 184, .06) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(rgba(57, 119, 184, .06) 1px, transparent 1px) 0 0 / 28px 28px,
        var(--paper);
    }

    a { color: inherit; text-decoration: none; }

    .top {
      padding: 18px clamp(16px, 4vw, 40px);
      background: rgba(255, 255, 255, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .top a {
      color: var(--blue);
      font-weight: 900;
    }

    .shell {
      width: min(1080px, calc(100% - 28px));
      margin: 0 auto;
      padding: 54px 0 70px;
    }

    .head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(250px, .7fr);
      gap: 26px;
      align-items: center;
    }

    h1, p { margin-top: 0; }

    h1 {
      margin-bottom: 14px;
      font-size: clamp(38px, 7vw, 70px);
      line-height: 1.04;
      letter-spacing: 0;
      text-shadow: 0 5px 0 rgba(239, 111, 97, .16);
    }

    .head p {
      max-width: 680px;
      margin-bottom: 0;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.75;
      font-weight: 700;
    }

    .scene {
      min-height: 240px;
      display: grid;
      place-items: center;
      border: 3px solid #d8cbea;
      border-radius: 8px;
      background: linear-gradient(180deg, #fff, #fff0df);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .scene svg {
      width: min(100%, 360px);
      height: auto;
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      min-height: 290px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 26px;
      border: 3px solid var(--accent);
      border-radius: 8px;
      background: var(--tint);
      box-shadow: var(--shadow);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .card:hover {
      transform: translateY(-7px) rotate(-1deg);
      box-shadow: 0 12px 0 rgba(38, 54, 78, .13);
    }

    .card:nth-child(2):hover { transform: translateY(-7px) rotate(1deg); }

    .icon {
      font-size: 66px;
      line-height: 1;
    }

    .card h2 {
      margin: 14px 0 9px;
      font-size: 29px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .card p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
      font-weight: 700;
    }

    .go {
      align-self: flex-start;
      margin-top: 22px;
      padding: 10px 15px;
      border-radius: 999px;
      color: #fff;
      background: var(--accent);
      font-weight: 900;
    }

    @media (max-width: 900px) {
      .head, .grid { grid-template-columns: 1fr; }
      .scene { min-height: 210px; }
      .card { min-height: 250px; }
    }
  </style>
</head>
<body>
  <header class="top"><a href="../../index.html">返回互動教學站</a></header>

  <main class="shell">
    <section class="head">
      <div>
        <h1>國語學習基地</h1>
        <p>用遊戲、偵探任務和漫畫情境練習閱讀理解、成語運用與語文表達。</p>
      </div>
      <div class="scene" aria-hidden="true">
        <svg viewBox="0 0 420 280">
          <rect x="52" y="202" width="316" height="24" rx="12" fill="#ffd166"></rect>
          <path d="M82 203 C102 130 156 94 212 126 C260 84 336 105 350 202" fill="#fff1cf" stroke="#e7a93c" stroke-width="7"></path>
          <rect x="126" y="92" width="80" height="104" rx="12" fill="#fff" stroke="#3977b8" stroke-width="7"></rect>
          <path d="M142 122 H190 M142 146 H186 M142 170 H176" stroke="#3977b8" stroke-width="6" stroke-linecap="round"></path>
          <rect x="224" y="96" width="82" height="100" rx="12" fill="#fff" stroke="#ef6f61" stroke-width="7"></rect>
          <path d="M244 119 H286 M244 143 H290 M244 167 H274" stroke="#ef6f61" stroke-width="6" stroke-linecap="round"></path>
          <circle cx="176" cy="68" r="22" fill="#3f9a71"></circle>
          <path d="M166 65 Q176 75 187 65" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"></path>
          <circle cx="278" cy="69" r="22" fill="#7561b8"></circle>
          <path d="M268 72 Q278 62 288 72" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"></path>
        </svg>
      </div>
    </section>

    <section class="grid" aria-label="國語課程">
      <a class="card" href="./idiom-quest/index.html" style="--accent: var(--coral); --tint: #fff1ef;">
        <div>
          <div class="icon">成</div>
          <h2>成語挑戰</h2>
          <p>用闖關答題練習成語意思、句子判斷和進階填空。</p>
        </div>
        <span class="go">開始挑戰</span>
      </a>

      <a class="card" href="./reading-detective/index.html" style="--accent: var(--blue); --tint: #eef6ff;">
        <div>
          <div class="icon">讀</div>
          <h2>閱讀偵探</h2>
          <p>閱讀短文線索，練習抓重點、推論和理解作者想法。</p>
        </div>
        <span class="go">開始辦案</span>
      </a>

      <a class="card" href="./idiom-comics/index.html" style="--accent: var(--green); --tint: #effbf4;">
        <div>
          <div class="icon">漫</div>
          <h2>成語漫畫資料庫</h2>
          <p>看漫畫學成語，從圖像情境理解典故、意思與生活用法。</p>
        </div>
        <span class="go">開始閱讀</span>
      </a>

      <a class="card" href="./similar-characters-gacha/index.html" style="--accent: var(--purple); --tint: #f3efff;">
        <div>
          <div class="icon">字</div>
          <h2>形近字扭蛋機</h2>
          <p>抽扭蛋、選正確用字，練習國小高年級常見形近字與能力測驗題型。</p>
        </div>
        <span class="go">開始挑戰</span>
      </a>
    </section>
  </main>
</body>
</html>
