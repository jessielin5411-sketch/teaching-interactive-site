<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>成語勇者大冒險</title>
  <style>
    :root{--ink:#26364e;--muted:#68758a;--paper:#fff9e9;--blue:#4d8fe8;--purple:#7964d7;--pink:#f06d91;--green:#35ad72;--yellow:#ffc94a;--red:#ef5b5b;--line:#dce4ed;--shadow:0 7px 0 rgba(38,54,78,.14)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Segoe UI","Noto Sans TC",system-ui,sans-serif;background:radial-gradient(circle at 10% 15%,rgba(255,201,74,.28) 0 3px,transparent 4px),radial-gradient(circle at 88% 25%,rgba(240,109,145,.2) 0 4px,transparent 5px),linear-gradient(90deg,rgba(77,143,232,.06) 1px,transparent 1px) 0 0/28px 28px,linear-gradient(rgba(77,143,232,.06) 1px,transparent 1px) 0 0/28px 28px,var(--paper);background-size:90px 90px,120px 120px,28px 28px,28px 28px;overflow-x:hidden}
    body::before,body::after{position:fixed;z-index:-1;font-size:70px;opacity:.15;animation:float 4s ease-in-out infinite;content:"⚔️"}body::before{left:3vw;top:18vh}body::after{right:3vw;bottom:12vh;content:"🏰";animation-delay:-2s}
    button,input{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    .topbar{min-height:62px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px clamp(14px,3vw,28px);border-bottom:1px solid var(--line);background:rgba(255,255,255,.9);backdrop-filter:blur(12px)}.top-actions{display:flex;align-items:center;gap:8px}.icon-button{min-width:44px;min-height:42px;border:2px solid var(--line);border-radius:12px;background:#fff;font-weight:900;box-shadow:0 4px 0 rgba(38,54,78,.12)}
    .brand{font-weight:950;font-size:clamp(18px,3vw,24px)}.home{color:var(--purple);font-weight:850;text-decoration:none}
    .shell{width:min(980px,calc(100% - 24px));margin:0 auto;padding:24px 0 48px}
    .panel{position:relative;padding:clamp(20px,4vw,34px);border:3px solid var(--line);border-radius:22px;background:rgba(255,255,255,.96);box-shadow:var(--shadow)}.panel::before{position:absolute;inset:8px;border:2px dashed rgba(121,100,215,.18);border-radius:15px;pointer-events:none;content:""}
    .start{text-align:center}.mascot{width:108px;height:108px;display:grid;place-items:center;margin:0 auto 16px;border:5px solid #fff;border-radius:50%;background:var(--yellow);box-shadow:var(--shadow);font-size:54px;animation:heroBounce 1.8s ease-in-out infinite}.hero-art{display:block;width:min(260px,65vw);height:240px;object-fit:contain;margin:-18px auto -2px;filter:drop-shadow(0 12px 5px rgba(38,54,78,.18));animation:heroBounce 1.8s ease-in-out infinite}
    h1,h2,p{margin-top:0}h1{margin-bottom:10px;font-size:clamp(34px,7vw,62px);line-height:1.05;text-shadow:0 5px 0 rgba(255,201,74,.35)}h2{font-size:clamp(25px,4vw,36px)}.lead{max-width:650px;margin:0 auto 22px;color:var(--muted);font-size:18px;line-height:1.65;font-weight:650}
    .levels{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}.level-card{padding:20px;border:2px solid var(--accent);border-radius:18px;background:var(--tint);text-align:left;box-shadow:var(--shadow);transition:transform .2s,filter .2s}.level-card:hover{transform:translateY(-5px) rotate(-1deg);filter:saturate(1.15)}.level-card:nth-child(2):hover{transform:translateY(-5px) rotate(1deg)}.level-card h3{margin:10px 0 6px;font-size:24px}.level-card p{margin:0;color:var(--muted);line-height:1.5}.level-icon{width:52px;height:52px;display:grid;place-items:center;border-radius:14px;color:#fff;background:var(--accent);font-size:25px;font-weight:950}.lock{opacity:.55}
    .primary,.secondary{min-height:50px;padding:0 20px;border:1px solid transparent;border-radius:8px;font-weight:900;box-shadow:var(--shadow)}.primary{color:#fff;background:var(--pink)}.secondary{color:var(--ink);border-color:var(--line);background:#fff}.primary:active,.secondary:active,.answer:active{transform:translateY(4px);box-shadow:0 3px 0 rgba(38,54,78,.14)}
    .hud{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;margin-bottom:14px}.progress{height:16px;overflow:hidden;border:2px solid #cbd7e2;border-radius:999px;background:#edf2f6}.progress>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .25s}.hearts{color:var(--red);font-size:23px;letter-spacing:3px}.score{font-size:20px;font-weight:950}.timer{width:58px;height:58px;display:grid;place-items:center;border:5px solid var(--yellow);border-radius:50%;background:#fff8d9;font-size:22px;font-weight:950;box-shadow:0 4px 0 rgba(38,54,78,.12)}.timer.danger{color:#fff;border-color:#a82727;background:var(--red);animation:pulse .55s infinite}
    .question-meta{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-weight:800}.question{margin:20px 0;padding:22px;border:3px dashed #b9cce1;border-radius:18px;background:linear-gradient(135deg,#f7fbff,#f5f1ff);text-align:center}.question.danger{border-color:var(--red);animation:shake .35s}.idiom{margin:0;color:var(--purple);font-size:clamp(38px,8vw,66px);line-height:1.2;font-weight:950;text-shadow:0 4px 0 rgba(121,100,215,.13)}.prompt{margin:12px 0 0;font-size:18px;font-weight:750;line-height:1.6}
    .answers{display:grid;grid-template-columns:1fr 1fr;gap:12px}.answer{min-height:72px;padding:14px;border:2px solid #cfdbe7;border-radius:8px;color:var(--ink);background:#fff;font-weight:800;line-height:1.45;box-shadow:0 5px 0 rgba(38,54,78,.12)}.answer:hover{border-color:var(--blue);background:#f0f7ff}.answer.correct{color:#fff;border-color:#278c5b;background:var(--green)}.answer.wrong{color:#fff;border-color:#d64646;background:var(--red)}
    .feedback{min-height:52px;margin-top:16px;padding:13px 16px;border-radius:8px;background:#fff5cf;font-weight:800;line-height:1.5}.actions{display:flex;justify-content:center;gap:10px;margin-top:20px}
    .result{text-align:center}.result-score{margin:12px 0;color:var(--purple);font-size:70px;font-weight:950}.certificate{position:relative;margin-top:24px;padding:30px;border:10px double var(--yellow);background:#fffdf6;text-align:center}.certificate h2{color:var(--purple)}.certificate-name{margin:20px 0;color:var(--pink);font-size:clamp(34px,7vw,60px);font-weight:950}.name-row{display:flex;gap:10px;max-width:520px;margin:20px auto}.name-row input{min-width:0;flex:1;padding:12px 14px;border:2px solid var(--line);border-radius:8px}
    #fireworks{position:fixed;z-index:20;inset:0;pointer-events:none}.source-note{margin-top:16px;color:var(--muted);font-size:13px;font-weight:700;text-align:center}.source-note button{margin-left:7px;border:0;color:var(--purple);background:transparent;font-weight:900;text-decoration:underline}
    @keyframes heroBounce{50%{transform:translateY(-8px) rotate(3deg)}}@keyframes float{50%{transform:translateY(-15px) rotate(8deg)}}@keyframes pulse{50%{transform:scale(1.12);box-shadow:0 0 0 10px rgba(239,91,91,.18)}}@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
    @media(max-width:680px){.levels,.answers{grid-template-columns:1fr}.hud{grid-template-columns:1fr auto auto}.score{grid-column:1/-1}.name-row{flex-direction:column}.question{padding:18px 12px}.home{display:none}}
  </style>
</head>
<body>
  <canvas id="fireworks"></canvas>
  <header class="topbar"><div class="brand">📜 成語勇者大冒險</div><div class="top-actions"><button class="icon-button" id="soundButton" title="切換音效">🔊</button><a class="home" href="../index.html">← 返回國語活動</a></div></header>
  <main class="shell">
    <section class="panel start" id="startScreen">
      <img class="hero-art" src="assets/chibi-idiom-hero.png" alt="Q版成語勇者拿著卷軸與木劍">
      <h1>成語勇者大冒險</h1>
      <p class="lead">挑戰十道成語題，守護你的三顆愛心！基礎關卡達到 90 分，就能解鎖進階填空挑戰。</p>
      <div class="levels">
        <button class="level-card" style="--accent:var(--blue);--tint:#edf6ff" data-level="basic"><span class="level-icon">初</span><h3>基礎關卡</h3><p>看成語，選出正確解釋。90 分即可晉級。</p></button>
        <button class="level-card lock" id="advancedCard" style="--accent:var(--purple);--tint:#f2efff" data-level="advanced"><span class="level-icon">進</span><h3>進階關卡 🔒</h3><p>先完整完成基礎關卡 10 題，才能進入挑戰。</p></button>
      </div>
      <p class="source-note"><span id="sourceNote">正在載入題庫...</span><button id="refreshBankButton">更新題庫</button></p>
    </section>

    <section class="panel hidden" id="gameScreen">
      <div class="hud"><div class="progress"><span id="progressBar"></span></div><div class="timer" id="timer">15</div><div class="hearts" id="hearts">♥ ♥ ♥</div><div class="score">分數 <span id="score">0</span></div></div>
      <div class="question-meta"><span id="levelLabel"></span><span id="questionCount"></span></div>
      <div class="question"><p class="idiom" id="idiom"></p><p class="prompt" id="prompt"></p></div>
      <div class="answers" id="answers"></div>
      <div class="feedback hidden" id="feedback"></div>
      <div class="actions"><button class="primary hidden" id="nextButton">下一題</button></div>
    </section>

    <section class="panel result hidden" id="resultScreen">
      <div class="mascot" id="resultMascot">🏆</div><h2 id="resultTitle"></h2><div class="result-score"><span id="finalScore"></span> 分</div><p class="lead" id="resultMessage"></p>
      <div class="name-row hidden" id="nameRow"><input id="studentName" maxlength="20" placeholder="輸入勇者姓名"><button class="primary" id="certificateButton">領取證書</button></div>
      <div class="certificate hidden" id="certificate"><p>成語勇者證書</p><h2>恭喜完成進階成語挑戰</h2><div class="certificate-name" id="certificateName"></div><p>展現了優秀的成語理解與應用能力</p><p id="certificateScore"></p></div>
      <div class="actions"><button class="primary" id="retryButton">再次挑戰</button><button class="secondary" id="menuButton">返回選單</button></div>
    </section>
  </main>
  <script>
    // Google Visualization JSONP 可讓直接從桌機開啟的網頁讀取線上題庫。
    const SHEET_QUERY_URL = "https://docs.google.com/spreadsheets/d/1Q7G9uAi1ZotD_5k7FhuDsNPmm3ezm-1Spw-SZDP88-s/gviz/tq?tqx=out:json";
    const fallbackQuestions = [
      ["basic","畫蛇添足","比喻多做了不必要的事，反而弄巧成拙。","","","","","是"],
      ["basic","守株待兔","比喻不主動努力，只想等待意外收穫。","","","","","是"],
      ["basic","井底之蛙","比喻見識狹窄的人。","","","","","是"],
      ["basic","一心一意","心意專一，沒有其他念頭。","","","","","是"],
      ["basic","半途而廢","事情沒有完成就停止。","","","","","是"],
      ["basic","雪中送炭","在別人急需時給予幫助。","","","","","是"],
      ["basic","胸有成竹","做事前已經有完整的計畫和把握。","","","","","是"],
      ["basic","異想天開","想法非常奇特，超出一般情況。","","","","","是"],
      ["basic","亡羊補牢","出了問題後趕快補救，還不算太晚。","","","","","是"],
      ["basic","專心致志","一心一意，集中精神。","","","","","是"],
      ["basic","熟能生巧","事情做熟練後，就能掌握技巧。","","","","","是"],
      ["basic","按部就班","依照一定的步驟做事。","","","","","是"],
      ["advanced","畫蛇添足","比喻多做了不必要的事，反而弄巧成拙。","作品已經完成，再加裝飾反而是____。","畫蛇添足","雪中送炭","守株待兔","是"],
      ["advanced","守株待兔","比喻不主動努力，只想等待意外收穫。","學習要主動努力，不能每天____。","守株待兔","胸有成竹","一心一意","是"],
      ["advanced","井底之蛙","比喻見識狹窄的人。","多閱讀、多旅行，才不會成為____。","井底之蛙","亡羊補牢","熟能生巧","是"],
      ["advanced","半途而廢","事情沒有完成就停止。","遇到困難也要堅持，不可以____。","半途而廢","按部就班","異想天開","是"],
      ["advanced","雪中送炭","在別人急需時給予幫助。","朋友最需要幫忙時，他伸出援手，真是____。","雪中送炭","畫蛇添足","守株待兔","是"],
      ["advanced","胸有成竹","做事前已經有完整的計畫和把握。","她準備充分，上台報告時顯得____。","胸有成竹","井底之蛙","半途而廢","是"],
      ["advanced","亡羊補牢","出了問題後趕快補救，還不算太晚。","發現錯誤後立刻改正，正是____。","亡羊補牢","一心一意","異想天開","是"],
      ["advanced","熟能生巧","事情做熟練後，就能掌握技巧。","每天練習直笛，果然____，越吹越好。","熟能生巧","雪中送炭","畫蛇添足","是"],
      ["advanced","按部就班","依照一定的步驟做事。","做實驗時要____，不能跳過步驟。","按部就班","守株待兔","井底之蛙","是"],
      ["advanced","專心致志","一心一意，集中精神。","他____地閱讀，完全沒注意到下課鐘聲。","專心致志","半途而廢","異想天開","是"]
    ];
    const headers=["level","idiom","meaning","sentence","option1","option2","option3","option4","enabled"];
    let bank=[],level="basic",round=[],index=0,score=0,hearts=3,answered=false,timeLeft=15,timerId=null,audioCtx=null,soundOn=true;
    const $=id=>document.getElementById(id), shuffle=a=>[...a].sort(()=>Math.random()-.5);
    function fallback(){return fallbackQuestions.map(r=>Object.fromEntries(headers.map((h,i)=>[h,h==="option4"?"":r[i-(i>7?1:0)]])))}
    function tableToObjects(table){const labels=table.cols.map(c=>c.label.trim());return table.rows.map(r=>Object.fromEntries(labels.map((label,i)=>[label,String(r.c[i]?.v??"").trim()])))}
    function loadBank(){ $("sourceNote").textContent="正在更新題庫...";return new Promise(resolve=>{const oldGoogle=window.google,script=document.createElement("script"),timer=setTimeout(fail,10000);function cleanup(){clearTimeout(timer);script.remove();if(oldGoogle===undefined)delete window.google;else window.google=oldGoogle}function fail(){cleanup();bank=fallback();$("sourceNote").textContent="題庫連線失敗，目前使用示範題庫";resolve()}window.google={visualization:{Query:{setResponse:data=>{if(data.status!=="ok")return fail();cleanup();bank=tableToObjects(data.table).filter(q=>q.enabled!=="否");const basic=bank.filter(q=>q.level==="basic").length,advanced=bank.filter(q=>q.level==="advanced").length;$("sourceNote").textContent=`已載入最新題庫：基礎 ${basic} 題、進階 ${advanced} 題`;playTone(660,.08,"sine",.05);resolve()}}}};script.onerror=fail;script.src=`${SHEET_QUERY_URL}&_=${Date.now()}`;document.head.appendChild(script)})}
    function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume()}
    function playTone(freq,duration=.12,type="sine",volume=.08,delay=0){if(!soundOn||!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain(),now=audioCtx.currentTime+delay;o.type=type;o.frequency.setValueAtTime(freq,now);g.gain.setValueAtTime(volume,now);g.gain.exponentialRampToValueAtTime(.001,now+duration);o.connect(g).connect(audioCtx.destination);o.start(now);o.stop(now+duration)}
    function sound(name){if(name==="start"){playTone(220,.18,"sawtooth",.06);playTone(330,.18,"sawtooth",.06,.16);playTone(440,.25,"sawtooth",.06,.32)}if(name==="tick")playTone(150,.055,"square",.025);if(name==="danger")playTone(310,.07,"square",.055);if(name==="correct"){playTone(523,.12,"sine",.08);playTone(659,.12,"sine",.08,.1);playTone(784,.2,"sine",.08,.2)}if(name==="wrong"){playTone(180,.22,"sawtooth",.08);playTone(120,.35,"sawtooth",.07,.14)}if(name==="finish"){playTone(392,.15,"triangle",.07);playTone(523,.15,"triangle",.07,.14);playTone(659,.28,"triangle",.07,.28)}}
    function stopTimer(){clearInterval(timerId);timerId=null}
    function startTimer(q){stopTimer();timeLeft=15;updateTimer();timerId=setInterval(()=>{timeLeft--;updateTimer();if(timeLeft<=5&&timeLeft>0)sound("danger");else sound("tick");if(timeLeft<=0){stopTimer();answer(null,"",q,true)}},1000)}
    function updateTimer(){const t=$("timer");t.textContent=timeLeft;t.classList.toggle("danger",timeLeft<=5);$("gameScreen").querySelector(".question").classList.toggle("danger",timeLeft<=5)}
    function setScreen(id){["startScreen","gameScreen","resultScreen"].forEach(x=>$(x).classList.toggle("hidden",x!==id))}
    function optionsFor(q){if(level==="advanced")return shuffle([q.option1,q.option2,q.option3,q.option4].filter(Boolean));const wrong=shuffle(bank.filter(x=>x.level==="basic"&&x.idiom!==q.idiom).map(x=>x.meaning)).slice(0,3);return shuffle([q.meaning,...wrong])}
    function start(l){initAudio();level=l;if(l==="advanced"&&localStorage.getItem("idiomBasicCompleted")!=="yes"){sound("wrong");alert("請先完整完成基礎關卡 10 題，才能挑戰進階關卡！");return}const pool=bank.filter(q=>q.level===l);round=shuffle(pool).slice(0,10);if(round.length<10){alert("此關卡至少需要 10 題啟用中的題目。");return}sound("start");index=0;score=0;hearts=3;setScreen("gameScreen");render()}
    function render(){answered=false;const q=round[index];$("score").textContent=score;$("hearts").textContent="♥ ".repeat(hearts).trim();$("progressBar").style.width=`${index/10*100}%`;$("levelLabel").textContent=level==="basic"?"基礎關卡":"進階關卡";$("questionCount").textContent=`第 ${index+1} / 10 題`;$("idiom").textContent=level==="basic"?q.idiom:q.sentence;$("prompt").textContent=level==="basic"?"哪一個是正確的成語解釋？":"請選出最適合填入空格的成語";$("feedback").classList.add("hidden");$("nextButton").classList.add("hidden");const answers=$("answers");answers.innerHTML="";optionsFor(q).forEach(text=>{const b=document.createElement("button");b.className="answer";b.textContent=text;b.onclick=()=>answer(b,text,q);answers.appendChild(b)});startTimer(q)}
    function answer(button,text,q,timedOut=false){if(answered)return;answered=true;stopTimer();const correct=level==="basic"?q.meaning:q.option1;document.querySelectorAll(".answer").forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add("correct")});const ok=text===correct;if(ok){score+=10;button.classList.add("correct");sound("correct")}else{hearts--;if(button)button.classList.add("wrong");sound("wrong")}const f=$("feedback");f.textContent=ok?`答對了！${q.idiom}：${q.meaning}`:timedOut?`時間到！正確答案是「${correct}」。${q.idiom}：${q.meaning}`:`答錯了，正確答案是「${correct}」。${q.idiom}：${q.meaning}`;f.classList.remove("hidden");$("score").textContent=score;$("hearts").textContent="♥ ".repeat(hearts).trim();$("nextButton").textContent=hearts<=0||index===9?"查看結果":"下一題";$("nextButton").classList.remove("hidden")}
    function next(){if(hearts<=0||index===9)return finish();index++;render()}
    function finish(){stopTimer();sound("finish");setScreen("resultScreen");$("finalScore").textContent=score;$("nameRow").classList.add("hidden");$("certificate").classList.add("hidden");const completedBasic=level==="basic"&&index===9;if(completedBasic){localStorage.setItem("idiomBasicCompleted","yes");unlock()}if(hearts<=0){$("resultMascot").textContent="💔";$("resultTitle").textContent="愛心用完了";$("resultMessage").textContent="別灰心，記住剛剛學到的成語，再挑戰一次！"}else if(completedBasic){$("resultMascot").textContent="🔓";$("resultTitle").textContent="基礎關卡完成，進階解鎖！";$("resultMessage").textContent="你完成了全部 10 題，現在可以挑戰進階成語填空！"}else if(level==="advanced"&&score>=80){$("resultMascot").textContent="🏆";$("resultTitle").textContent="成語勇者挑戰成功！";$("resultMessage").textContent="輸入名字，領取你的成語勇者證書。";$("nameRow").classList.remove("hidden");if(score===100)fireworks()}else{$("resultMascot").textContent="💪";$("resultTitle").textContent="再接再厲！";$("resultMessage").textContent=level==="basic"?"完整完成基礎關卡 10 題，就能解鎖進階挑戰。":"進階關卡達到 80 分就能領取證書。"}}
    function unlock(){const c=$("advancedCard");c.classList.remove("lock");c.querySelector("h3").textContent="進階關卡";c.querySelector("p").textContent="完成成語填空。80 分可獲得勇者證書。"}
    function certificate(){const n=$("studentName").value.trim();if(!n)return alert("請先輸入名字");$("certificateName").textContent=n;$("certificateScore").textContent=`進階關卡成績：${score} 分`;$("certificate").classList.remove("hidden")}
    function fireworks(){const c=$("fireworks"),x=c.getContext("2d");c.width=innerWidth;c.height=innerHeight;let dots=[];for(let j=0;j<8;j++){const ox=Math.random()*c.width,oy=Math.random()*c.height*.55;for(let i=0;i<35;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;dots.push({x:ox,y:oy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,color:`hsl(${Math.random()*360} 90% 60%)`,life:90})}}function tick(){x.clearRect(0,0,c.width,c.height);dots.forEach(d=>{d.x+=d.vx;d.y+=d.vy;d.vy+=.04;d.life--;x.fillStyle=d.color;x.fillRect(d.x,d.y,4,4)});dots=dots.filter(d=>d.life>0);if(dots.length)requestAnimationFrame(tick)}tick()}
    document.querySelectorAll("[data-level]").forEach(b=>b.onclick=()=>start(b.dataset.level));$("nextButton").onclick=next;$("retryButton").onclick=()=>start(level);$("menuButton").onclick=()=>{stopTimer();setScreen("startScreen")};$("certificateButton").onclick=certificate;$("refreshBankButton").onclick=loadBank;$("soundButton").onclick=()=>{initAudio();soundOn=!soundOn;$("soundButton").textContent=soundOn?"🔊":"🔇";if(soundOn)playTone(660,.1,"sine",.06)};if(localStorage.getItem("idiomBasicCompleted")==="yes")unlock();loadBank();
  </script>
</body>
