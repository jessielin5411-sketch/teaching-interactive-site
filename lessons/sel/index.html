<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SEL 社會情緒學習</title>
  <style>
    :root {
      --ink: #243f3a;
      --muted: #64736d;
      --green: #348c67;
      --purple: #6f5bb8;
      --amber: #e7a93c;
      --coral: #e66b5b;
      --paper: #f3faf5;
      --line: #d8e8dd;
      --shadow: 0 8px 0 rgba(36, 63, 58, .14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 14% 18%, rgba(111, 91, 184, .15) 0 5px, transparent 6px),
        radial-gradient(circle at 86% 24%, rgba(231, 169, 60, .20) 0 6px, transparent 7px),
        linear-gradient(90deg, rgba(52, 140, 103, .06) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(rgba(52, 140, 103, .06) 1px, transparent 1px) 0 0 / 28px 28px,
        var(--paper);
    }

    a { color: inherit; text-decoration: none; }

    .top {
      padding: 18px clamp(16px, 4vw, 40px);
      background: rgba(255, 255, 255, .92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .top a {
      color: var(--green);
      font-weight: 900;
    }

    .shell {
      width: min(1060px, calc(100% - 28px));
      margin: 0 auto;
      padding: 52px 0 70px;
    }

    .head {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, .9fr);
      gap: 30px;
      align-items: center;
    }

    .head h1 {
      margin: 0;
      font-size: clamp(38px, 7vw, 70px);
      line-height: 1.03;
      letter-spacing: 0;
    }

    .head p {
      max-width: 680px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.75;
      font-weight: 650;
    }

    .scene {
      min-height: 260px;
      border: 3px solid #b9dcc8;
      border-radius: 24px;
      background: linear-gradient(180deg, #e9fff2, #fff9e8);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .scene svg {
      width: min(100%, 460px);
      height: auto;
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      margin-top: 42px;
    }

    .card {
      min-height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 28px;
      border: 3px solid var(--accent);
      border-radius: 22px;
      background: var(--bg);
      box-shadow: var(--shadow);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .card:hover {
      transform: translateY(-7px) rotate(-1deg);
      box-shadow: 0 12px 0 rgba(36, 63, 58, .14);
    }

    .icon {
      font-size: 74px;
      line-height: 1;
    }

    .card h2 {
      margin: 14px 0 8px;
      font-size: 31px;
      letter-spacing: 0;
    }

    .card p {
      color: var(--muted);
      font-size: 17px;
      line-height: 1.68;
      font-weight: 650;
      margin: 0;
    }

    .go {
      align-self: flex-start;
      margin-top: 24px;
      padding: 11px 16px;
      border-radius: 999px;
      color: #fff;
      background: var(--accent);
      font-weight: 900;
    }

    .emotion { --accent: var(--purple); --bg: #f7f4ff; }
    .detective { --accent: var(--coral); --bg: #fff6ee; }

    @media (max-width: 800px) {
      .head { grid-template-columns: 1fr; }
      .scene { min-height: 220px; }
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 260px; }
    }
  </style>
</head>
<body>
  <header class="top"><a href="../../index.html">返回互動教學站</a></header>
  <main class="shell">
    <section class="head">
      <div>
        <h1>SEL 社會情緒學習</h1>
        <p>認識情緒、練習同理與溝通，學會在真實的人際情境中照顧自己，也尊重別人。</p>
      </div>
      <div class="scene" aria-hidden="true">
        <svg viewBox="0 0 520 310" role="img">
          <rect x="40" y="210" width="440" height="34" rx="17" fill="#b8e3c8" />
          <path d="M92 214 C120 142 170 106 230 128 C286 78 388 98 424 206" fill="#d8f4e2" stroke="#348c67" stroke-width="6" />
          <circle cx="175" cy="128" r="38" fill="#ffd166" stroke="#d9961f" stroke-width="5" />
          <path d="M154 126 Q164 116 174 126 M187 126 Q197 116 207 126 M166 145 Q181 158 198 145" fill="none" stroke="#394240" stroke-width="5" stroke-linecap="round" />
          <circle cx="325" cy="133" r="42" fill="#a8d8ff" stroke="#3a8fc7" stroke-width="5" />
          <path d="M306 128 Q315 136 324 128 M337 128 Q346 136 355 128 M316 151 Q326 146 338 151" fill="none" stroke="#394240" stroke-width="5" stroke-linecap="round" />
          <path d="M258 70 Q260 40 291 39 Q318 38 323 65 Q329 94 286 98 L258 124 L266 93 Q246 87 258 70Z" fill="#fff" stroke="#6f5bb8" stroke-width="5" />
          <circle cx="278" cy="69" r="5" fill="#6f5bb8" />
          <circle cx="297" cy="69" r="5" fill="#6f5bb8" />
          <path d="M276 86 Q287 93 300 86" fill="none" stroke="#6f5bb8" stroke-width="4" stroke-linecap="round" />
          <path d="M105 224 L105 270 M405 224 L405 270" stroke="#6f5bb8" stroke-width="10" stroke-linecap="round" />
          <path d="M140 244 C190 282 330 282 380 244" fill="none" stroke="#e66b5b" stroke-width="10" stroke-linecap="round" />
        </svg>
      </div>
    </section>

    <section class="grid" aria-label="SEL 課程遊戲">
      <a class="card emotion" href="./emotion-map/index.html">
        <div>
          <div class="icon">🗺️💗</div>
          <h2>情緒地圖</h2>
          <p>探索情緒島嶼、辨認身體訊號，運用策略安撫情緒怪獸。</p>
        </div>
        <span class="go">開始探索</span>
      </a>

      <a class="card detective" href="./social-detective/index.html">
        <div>
          <div class="icon">🕵️‍♀️🧭</div>
          <h2>人際情境偵探</h2>
          <p>面對誤會、分組衝突與網路訊息，判讀線索，選出更成熟的回應方式。</p>
        </div>
        <span class="go">開始辦案</span>
      </a>
    </section>
  </main>
</body>
</html>
