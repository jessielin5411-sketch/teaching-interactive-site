// --- 全局背景音樂 URL (更換為保證不阻擋的 Wikimedia 開源 MP3，薩替的 Gymnopédie No. 1) ---
const BGM_URL = "https://upload.wikimedia.org/wikipedia/commons/b/b4/Gymnop%C3%A9die_No._1_%28ISRC_USUAN1100787%29.mp3";
const FALLBACK_BGM_URL = "https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3";

// --- 內建 Web Audio API 音效合成器 (100% 跨瀏覽器支援，免下載，無延遲) ---
let audioCtx = null;
const getAudioCtx = () => {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
};

const playSFX = (type) => {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    const now = ctx.currentTime;

    if (type === 'pop') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
      gain.gain.setValueAtTime(0.5, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
    } else if (type === 'dice') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.setValueAtTime(800, now + 0.1);
      osc.frequency.setValueAtTime(1000, now + 0.2);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
      osc.start(now);
      osc.stop(now + 0.3);
    } else if (type === 'win') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(523.25, now);
      osc.frequency.setValueAtTime(659.25, now + 0.15);
      osc.frequency.setValueAtTime(783.99, now + 0.3);
      osc.frequency.setValueAtTime(1046.50, now + 0.45);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.linearRampToValueAtTime(0.2, now + 0.45);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
      osc.start(now);
      osc.stop(now + 0.8);
    } else if (type === 'fire') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(100, now);
      osc.frequency.linearRampToValueAtTime(50, now + 0.2);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now);
      osc.stop(now + 0.2);
    } else if (type === 'heal') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.4, now + 0.1);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    } else if (type === 'success') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.setValueAtTime(659.25, now + 0.1);
      osc.frequency.setValueAtTime(880, now + 0.2);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now);
      osc.stop(now + 0.4);
    }
  } catch (err) {
    console.log("SFX error:", err);
  }
};

const CuteMonsterSprite = ({ type = 'happy', isHappy, isSad, flowerLevel = 0 }) => {

            ))}
            <circle cx="0" cy="-5" r="6" fill={flowerLevel === 3 ? "#eab308" : "#fbbf24"} />
          </g>
        )}
      </g>
    );
  };

  const renderFaceAndEffects = () => {
    let eyeLeft, eyeRight, mouth;
    
    if (type === 'happy') {
      eyeLeft = <path d="M -14 -2 Q -10 -8 -6 -2" stroke="#333" strokeWidth="3" fill="none" strokeLinecap="round" />;
      eyeRight = <path d="M 6 -2 Q 10 -8 14 -2" stroke="#333" strokeWidth="3" fill="none" strokeLinecap="round" />;
      mouth = <path d="M -8 6 Q 0 16 8 6 Z" fill="#ff9999" stroke="#333" strokeWidth="2" strokeLinejoin="round" />;
    } else if (type === 'calm') {
      eyeLeft = <path d="M -14 -2 Q -10 4 -6 -2" stroke="#333" strokeWidth="3" fill="none" strokeLinecap="round" />;
      eyeRight = <path d="M 6 -2 Q 10 4 14 -2" stroke="#333" strokeWidth="3" fill="none" strokeLinecap="round" />;
      mouth = <path d="M -4 8 Q 0 12 4 8" stroke="#333" strokeWidth="2.5" fill="none" strokeLinecap="round" />;
    } else if (type === 'angry') {
      eyeLeft = <path d="M -16 -6 L -6 0" stroke="#333" strokeWidth="3" strokeLinecap="round" />;
      eyeRight = <path d="M 16 -6 L 6 0" stroke="#333" strokeWidth="3" strokeLinecap="round" />;
      mouth = <path d="M -6 10 L -2 6 L 2 10 L 6 6" stroke="#333" strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />;
    } else if (type === 'shy') {
      eyeLeft = <g><circle cx="-12" cy="0" r="6" fill="#333" /><circle cx="-14" cy="-2" r="2" fill="white" /><circle cx="-10" cy="2" r="1" fill="white" /></g>;
      eyeRight = <g><circle cx="12" cy="0" r="6" fill="#333" /><circle cx="10" cy="-2" r="2" fill="white" /><circle cx="14" cy="2" r="1" fill="white" /></g>;
      mouth = <circle cx="0" cy="8" r="2" fill="#333" />;
    }

    if (isHappy && type !== 'happy') {
      mouth = <path d="M -8 8 Q 0 16 8 8" stroke="#333" strokeWidth="3" fill="none" strokeLinecap="round" />;
    }
    if (isSad) {
      eyeLeft = <path d="M -14 -4 Q -10 -6 -6 -2" stroke="#333" strokeWidth="3" fill="none" strokeLinecap="round" />;
      eyeRight = <path d="M 6 -2 Q 10 -6 14 -4" stroke="#333" strokeWidth="3" fill="none" strokeLinecap="round" />;
      mouth = <path d="M -6 14 Q 0 8 6 14" stroke="#333" strokeWidth="3" fill="none" strokeLinecap="round" />;
    }

    const blushRy = type === 'shy' ? 6 : 3;
    const blushRx = type === 'shy' ? 8 : 5;
    const blushY = type === 'shy' ? 6 : 5;

    return (
      <g transform="translate(0, -5)">
        <ellipse cx="-16" cy={blushY} rx={blushRx} ry={blushRy} fill="#ffb3ba" opacity="0.8" className="animate-pulse" />
        <ellipse cx="16" cy={blushY} rx={blushRx} ry={blushRy} fill="#ffb3ba" opacity="0.8" className="animate-pulse" />
        {eyeLeft}
        {eyeRight}
        {mouth}
        {isSad && <circle cx="-12" cy="6" r="3" fill="#60a5fa" className="animate-ping-slow origin-center" />}
      </g>
    );
  };

  return (
    <svg viewBox="0 0 100 120" className={`w-full h-full drop-shadow-xl transition-transform duration-300 ${isHappy ? 'animate-bounce' : ''}`}>
      {renderFlower()}
      <g transform="translate(50, 70)">
        {type === 'happy' && (
          <g className="animate-bounce-slow">
            <circle cx="0" cy="0" r="30" fill="#fde047" stroke="#eab308" strokeWidth="3" />

              <path key={i} d="M 0 -32 L 0 -40" stroke="#fde047" strokeWidth="4" strokeLinecap="round" transform={`rotate(${angle})`} className="animate-pulse" />
            ))}
            {renderFaceAndEffects()}
          </g>
        )}
        {type === 'calm' && (
          <g className="animate-float">
            <path d="M 0 -35 C -25 -35 -35 -10 -35 15 C -35 35 -15 40 0 40 C 15 40 35 35 35 15 C 35 -10 25 -35 0 -35 Z" fill="#93c5fd" stroke="#3b82f6" strokeWidth="3" />
            {renderFaceAndEffects()}
          </g>
        )}
        {type === 'angry' && (
          <g className="animate-wiggle">
            <path d="M -30 0 L -20 -25 L 0 -35 L 20 -25 L 30 0 L 25 25 L 0 35 L -25 25 Z" fill="#fca5a5" stroke="#ef4444" strokeWidth="3" />

            {renderFaceAndEffects()}
          </g>
        )}
      </g>
    </svg>
  );
};

        <path d="M 40 20 L 30 80 M 60 20 L 70 80 M 20 40 L 80 40 M 15 60 L 85 60" stroke="#fde047" strokeWidth="2" />

  };
  return svgs[type] || null;
};

// ==========================================
// 主程式
// ==========================================
function App() {
  const [gameState, setGameState] = useState('home'); 
  const [selectedChar, setSelectedChar] = useState(null);
  const [playerPos, setPlayerPos] = useState(0);
  const [points, setPoints] = useState(0);
  const [isMoving, setIsMoving] = useState(false);
  const [mapTiles, setMapTiles] = useState([]);
  
  const [modalData, setModalData] = useState(null); 
  const [modalError, setModalError] = useState("");
  const [giantDice, setGiantDice] = useState({ show: false, isRolling: false, number: 1 });
  const [flyingEmojis, setFlyingEmojis] = useState([]);
  
  const [inputText, setInputText] = useState('');
  const [fateResult, setFateResult] = useState(null);
  const [isRollingFate, setIsRollingFate] = useState(false);
  const [isResting, setIsResting] = useState(false);
  const [monsterHP, setMonsterHP] = useState(3);
  const [monsterHit, setMonsterHit] = useState(false);

  const [isMusicPlaying, setIsMusicPlaying] = useState(false);
  const audioRef = useRef(null);
  
  const targetPoints = 20; 
  const progressPercent = Math.min((points / targetPoints) * 100, 100);
  const flowerLevel = Math.min(Math.floor(Math.max(points, 0) / 5), 3);

  // --- 自動滾動跟隨玩家位置 ---
  useEffect(() => {
    if (gameState === 'playing') {
      const activeTile = document.getElementById(`tile-${playerPos}`);
      if (activeTile) {
        activeTile.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  }, [playerPos, gameState]);

  useEffect(() => {
    const initialTiles = [
      { id: 0, type: 'start', title: '出發點', desc: '冒險開始', animeIcon: 'start-flag', color: 'bg-green-100 border-green-400 text-green-700' },
      ...TILE_TEMPLATES.map((t, i) => ({ ...t, id: i + 1 })),
      { id: TILE_TEMPLATES.length + 1, type: 'extend', title: '下一區', effect: '繼續探險', animeIcon: 'next-map', color: 'bg-green-100 border-green-400 text-green-700' },
    ].map(tile => ({ ...tile, borderRadius: getRandomBorderRadius() }));
    setMapTiles(initialTiles);
  }, []);

  // --- 音樂切換獨立處理函式 ---
  const toggleMusic = () => {
    if (!audioRef.current) return;
    if (isMusicPlaying) {
      audioRef.current.pause();
      setIsMusicPlaying(false);
    } else {
      audioRef.current.volume = 0.15;
      audioRef.current.play().then(() => {
        setIsMusicPlaying(true);
      }).catch(err => {
        console.error("Music toggle blocked:", err);
        setIsMusicPlaying(false);
      });
    }
  };

  const startGame = () => {
    if (!selectedChar) return;
    getAudioCtx().resume(); 
    
    if (audioRef.current) {
      audioRef.current.volume = 0.15; 
      audioRef.current.play().then(() => {
        setIsMusicPlaying(true);
      }).catch(e => {
        console.log("BGM start prevented:", e);
        setIsMusicPlaying(false);
      });
    }

    setGameState('playing');
  };

  const restartGame = () => {
    setGameState('home');
    setSelectedChar(null);
    setPlayerPos(0);
    setPoints(0);
    setIsMoving(false);
    setModalData(null);
    setGiantDice({ show: false, isRolling: false, number: 1 });
    
    if (audioRef.current) {
      audioRef.current.pause();
      audioRef.current.currentTime = 0;
    }
    setIsMusicPlaying(false); 

    const initialTiles = [
      { id: 0, type: 'start', title: '出發點', desc: '冒險開始', animeIcon: 'start-flag', color: 'bg-green-100 border-green-400 text-green-700' },
      ...TILE_TEMPLATES.map((t, i) => ({ ...t, id: i + 1 })),
      { id: TILE_TEMPLATES.length + 1, type: 'extend', title: '下一區', effect: '繼續探險', animeIcon: 'next-map', color: 'bg-green-100 border-green-400 text-green-700' },
    ].map(tile => ({ ...tile, borderRadius: getRandomBorderRadius() }));
    setMapTiles(initialTiles);
  };

  const extendMap = (currentPos) => {
    const newTiles = Array.from({length: 10}).map((_, i) => ({
      ...TILE_TEMPLATES[Math.floor(Math.random() * TILE_TEMPLATES.length)],
      id: mapTiles.length + i,
      borderRadius: getRandomBorderRadius()
    }));
    newTiles.push({ id: mapTiles.length + 10, type: 'extend', title: '下一區', effect: '繼續探險', animeIcon: 'next-map', color: 'bg-green-100 border-green-400 text-green-700', borderRadius: getRandomBorderRadius() });
    setMapTiles(prev => [...prev, ...newTiles]);
    
    // 將新地圖資料寫入後再移動玩家，確保新的格子存在
    setTimeout(() => {
        setPlayerPos(currentPos + 1);
        
        setTimeout(() => {
          const nextTile = newTiles[0];
          setInputText("");
          setMonsterHP(3);
          setFateResult(null);
          setIsResting(false);
          setModalError("");
          setModalData(nextTile);
        }, 500); 
    }, 100);
  };

  const rollMoveDice = () => {
    if (isMoving || giantDice.show) return;
    playSFX('dice');
    setGiantDice({ show: true, isRolling: true, number: 1 });
    const steps = Math.floor(Math.random() * 6) + 1; 
    
    let spinCount = 0;
    const spinInterval = setInterval(() => {
      setGiantDice(prev => ({ ...prev, number: Math.floor(Math.random() * 6) + 1 }));
      spinCount++;
      if(spinCount > 12) {
        clearInterval(spinInterval);
        setGiantDice({ show: true, isRolling: false, number: steps });
        setTimeout(() => {
          setGiantDice({ show: false, isRolling: false, number: steps });
          movePlayer(steps);
        }, 1200);
      }
    }, 80);
  };

  const movePlayer = (steps) => {
    setIsMoving(true);
    let currentStep = 0;
    const interval = setInterval(() => {
      currentStep++;
      setPlayerPos(prev => Math.min(prev + 1, mapTiles.length - 1));
      if (currentStep >= steps) {
        clearInterval(interval);
        setIsMoving(false);
        setTimeout(() => triggerTileEvent(playerPos + steps), 400);
      }
    }, 400); 
  };

  const triggerTileEvent = (pos) => {
    const tile = mapTiles[pos > mapTiles.length - 1 ? mapTiles.length - 1 : pos];
    if (tile.type === 'start') return;
    if (tile.type === 'extend') return extendMap(pos);

    setInputText("");
    setMonsterHP(3);
    setFateResult(null);
    setIsResting(false);
    setModalError("");
    setModalData(tile);
  };

  const handleCloseModal = () => {
    if (!modalData) return;
    
    if (modalData.type === 'interactive' && !inputText.trim()) {
      setModalError("請點擊下方表情或輸入文字喔！");
      return;
    }
    if (modalData.type === 'chance' && !fateResult) {
      setModalError("請先點擊紫色大骰子！");
      return;
    }
    if (modalData.type === 'monster' && monsterHP > 0) return;

    let earnedPoints = modalData.points || 0;
    let moveSteps = modalData.move || 0;

    if (modalData.type === 'chance' && fateResult) {
      earnedPoints = fateResult.points;
      moveSteps = fateResult.move;
    }

    setPoints(prev => {
      const newPts = prev + earnedPoints;
      if (newPts >= targetPoints) {
        setTimeout(() => {
          playSFX('win');
          setGameState('win');
        }, 800);
      }
      return newPts;
    });

    if (moveSteps !== 0) {
      setTimeout(() => {
        setPlayerPos(prev => {
          let next = prev + moveSteps;
          if (next < 0) next = 0;
          if (next >= mapTiles.length) next = mapTiles.length - 1;
          if(mapTiles[next]?.type === 'extend') setTimeout(()=> extendMap(next), 500);
          return next;
        });
      }, 500);
    }
    setModalData(null);
  };

  const handleEmojiClick = (e, emojiStr) => {
    setModalError("");
    playSFX('pop');
    
    const rect = e.target.getBoundingClientRect();
    const id = Date.now();
    setFlyingEmojis(prev => [...prev, { 
      id, emoji: emojiStr.split(' ')[0], 
      x: rect.left + rect.width / 2, 
      y: rect.top + rect.height / 2 
    }]);

    setTimeout(() => {
      setInputText(prev => prev ? prev + ' ' + emojiStr : emojiStr);
      setFlyingEmojis(prev => prev.filter(item => item.id !== id));
    }, 600); 
  };

  const hitMonster = () => {
    if (monsterHP <= 0) return;
    
    if (monsterHP === 1) {
      playSFX('success');
    } else {
      playSFX('heal');
    }

    setMonsterHit(true);
    setMonsterHP(prev => prev - 1);
    setTimeout(() => setMonsterHit(false), 200);
  };

  const rollFateDice = () => {
    setModalError("");
    setIsRollingFate(true);
    playSFX('dice');
    setTimeout(() => {
      setFateResult(FATE_EVENTS[Math.floor(Math.random() * FATE_EVENTS.length)]);
      setIsRollingFate(false);
    }, 1500);
  };
  
  const clickFire = () => {
    setIsResting(true);
    playSFX('fire');
  };

  const activeCharData = CHARACTERS.find(c => c.id === selectedChar) || CHARACTERS[0];

  // ==========================================
  // 全域自訂 CSS (包含滾動條美化)
  // ==========================================

    .animate-spin-slow { animation: spin-slow 3s linear infinite; }
    @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .animate-bounce-slow { animation: bounce-slow 2s infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .animate-float { animation: float 3s ease-in-out infinite; }
    @keyframes wiggle { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
    .animate-wiggle { animation: wiggle 0.5s linear infinite; }
    @keyframes ping-slow { 0% { transform: scale(1); opacity: 1; } 75%, 100% { transform: scale(2); opacity: 0; } }
    .animate-ping-slow { animation: ping-slow 1.5s cubic-bezier(0, 0, 0.2, 1) infinite; }

    .modal-scroll::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
  `;

  return (
    <>
      <audio ref={audioRef} loop preload="auto">
        <source src={BGM_URL} type="audio/mpeg" />
        <source src={FALLBACK_BGM_URL} type="audio/mpeg" />
      </audio>

      {/* --- 首頁 --- */}
      {gameState === 'home' && (
        <div className="min-h-screen bg-gradient-to-b from-sky-400 to-blue-200 relative flex flex-col items-center justify-center font-sans p-6 overflow-hidden">
          <style>{customStyles}</style>
          <div className="absolute top-1/2 left-1/2 w-[200vw] h-[200vw] -translate-y-1/2 anime-sunburst z-0"></div>

          <div className="absolute top-40 right-10 text-white/60 animate-[float_6s_ease-in-out_infinite_reverse] z-0"><Cloud size={150} fill="currentColor" /></div>

          <div className="z-10 text-center max-w-3xl">
            <h1 className="text-6xl md:text-7xl font-black text-white mb-6 drop-shadow-[0_4px_4px_rgba(0,0,0,0.2)] tracking-wide" style={{ textShadow: '0 0 10px rgba(255,255,255,0.8), 2px 2px 0px #3b82f6' }}>
              悠遊情緒地圖
            </h1>
            <p className="text-xl text-blue-900 bg-white/90 px-8 py-3 rounded-full mb-10 font-bold shadow-[0_4px_0_#93c5fd] inline-block">
              選一個小怪獸，展開大冒險吧！
            </p>
            
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
              {CHARACTERS.map((char) => (
                <div key={char.id} onClick={() => setSelectedChar(char.id)} className={`cursor-pointer p-4 bg-white border-4 transition-all flex flex-col items-center justify-center rounded-3xl ${selectedChar === char.id ? 'border-yellow-400 scale-110 shadow-[0_10px_20px_rgba(0,0,0,0.2)]' : 'border-blue-100 shadow-md hover:scale-105'}`}>
                  <div className="w-24 h-28 mb-2"><CuteMonsterSprite type={char.type} isHappy={selectedChar === char.id} flowerLevel={3} /></div>
                  <span className="font-bold text-gray-800">{char.name}</span>
                </div>
              ))}
            </div>
            
            <button onClick={startGame} disabled={!selectedChar} className={`px-12 py-5 rounded-full text-2xl font-black transition-all ${selectedChar ? 'bg-yellow-400 text-orange-700 shadow-[0_6px_0_#ca8a04] hover:translate-y-1 hover:shadow-[0_2px_0_#ca8a04] animate-bounce' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
              {selectedChar ? 'START!' : '請選擇角色'}
            </button>
          </div>
        </div>
      )}

      {/* --- 勝利結算 --- */}
      {gameState === 'win' && (
        <div className="min-h-screen bg-gradient-to-b from-yellow-300 to-orange-200 flex flex-col items-center justify-center p-6 text-center relative overflow-hidden">
          <style>{customStyles}</style>
          <div className="absolute top-1/2 left-1/2 w-[200vw] h-[200vw] -translate-y-1/2 anime-sunburst z-0 opacity-40"></div>
          <div className="z-10 flex flex-col items-center">
            <Sparkles className="text-white w-24 h-24 animate-spin mb-4 drop-shadow-md" />
            <h1 className="text-6xl font-black text-orange-600 mb-6 drop-shadow-md" style={{ textShadow: '2px 2px 0px white' }}>大成功！</h1>
            <div className="w-64 h-72 mb-8 animate-bounce"><CuteMonsterSprite type={activeCharData.type} isHappy={true} flowerLevel={3} /></div>
            <div className="bg-white/90 p-8 rounded-3xl shadow-xl max-w-md mb-8 border-4 border-orange-300">
                <p className="text-2xl text-orange-700 font-black mb-2">你的花朵完美綻放！🌸</p>
                <p className="text-gray-700 font-bold leading-relaxed">你已經學會接納自己的情緒、勇敢面對挑戰了。帶著這份覺察的力量繼續前進吧！</p>
            </div>
            <button onClick={restartGame} className="px-10 py-5 bg-white text-orange-600 border-4 border-orange-500 rounded-full text-2xl font-black shadow-[0_6px_0_#f97316] hover:translate-y-1 hover:shadow-[0_2px_0_#f97316] transition-all">再次冒險</button>
          </div>
        </div>
      )}

      {/* --- 遊戲主地圖 --- */}
      {gameState === 'playing' && (
        <div className="min-h-screen font-sans relative bg-gradient-to-b from-sky-300 to-blue-100 overflow-x-hidden">
          <style>{customStyles}</style>
          
          <div className="fixed top-1/2 left-1/2 w-[200vw] h-[200vw] -translate-y-1/2 anime-sunburst z-0 opacity-20 pointer-events-none"></div>
          <div className="fixed top-10 left-[-50px] text-white/80 animate-[float_4s_ease-in-out_infinite] z-0 pointer-events-none"><Cloud size={200} fill="currentColor" /></div>
          <div className="fixed top-40 right-[-50px] text-white/60 animate-[float_6s_ease-in-out_infinite_reverse] z-0 pointer-events-none"><Cloud size={300} fill="currentColor" /></div>

          {/* 頂部狀態列 (絕對固定不動區域) */}
          <div className="fixed top-0 left-0 w-full z-40 bg-white/95 shadow-md p-3 px-4 md:px-6 border-b-4 border-sky-200 flex flex-col gap-3">
            <div className="flex justify-between items-center max-w-5xl mx-auto w-full">
              <div className="flex items-center gap-3">
                <div className="w-16 h-16 bg-sky-100 rounded-2xl border-2 border-sky-300 p-1 relative flex justify-center items-end overflow-hidden shadow-inner">
                  <div className="w-14 h-16 absolute -bottom-1"><CuteMonsterSprite type={activeCharData.type} isHappy={points>0} isSad={points<0} flowerLevel={flowerLevel}/></div>
                </div>
                <div>
                  <p className="font-bold text-gray-700 text-sm">{activeCharData.name}</p>
                  <div className="flex items-end gap-1">
                    <p className="text-sky-600 font-black text-2xl leading-none">{points}</p>
                    <span className="text-xs text-gray-500 font-bold mb-0.5">/ {targetPoints} 點</span>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-2 md:gap-4">
                <button onClick={toggleMusic} className="p-3 bg-sky-100 rounded-full text-sky-600 hover:bg-sky-200 transition-colors shadow-sm active:scale-95">
                  {isMusicPlaying ? <Music className="w-5 h-5" /> : <VolumeX className="w-5 h-5 opacity-50" />}
                </button>
                <button onClick={rollMoveDice} disabled={isMoving || modalData || giantDice.show} className={`flex items-center gap-2 px-5 py-3 rounded-full font-black text-white transition-all border-b-4 ${isMoving || modalData || giantDice.show ? 'bg-gray-300 border-gray-400 translate-y-1' : 'bg-sky-500 hover:bg-sky-400 border-sky-700 active:translate-y-1 active:border-b-0 shadow-lg'}`}>
                  <Dices className="w-5 h-5" /> <span className="hidden md:inline">擲骰子</span>
                </button>
              </div>
            </div>
            <div className="w-full max-w-5xl mx-auto bg-sky-100 rounded-full h-3 shadow-inner overflow-hidden"><div className="bg-gradient-to-r from-yellow-400 to-orange-400 h-3 rounded-full transition-all duration-700" style={{width: `${progressPercent}%`}}></div></div>
          </div>

          {/* 地圖網格 */}
          <div className="pt-[150px] pb-32 max-w-5xl mx-auto z-10 relative p-4 scroll-smooth">
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 md:gap-6 relative">
              {mapTiles.map((tile, index) => {
                const isCurrent = playerPos === index;
                const showRightArrow = (index + 1) % 4 !== 0 && index !== mapTiles.length - 1;
                const showDownArrow = (index + 1) % 4 === 0 && index !== mapTiles.length - 1;

                return (
                  <div key={`${tile.id}-${index}`} id={`tile-${index}`} className="relative flex justify-center items-center h-36 md:h-44">
                    <div className={`absolute inset-1 md:inset-2 flex flex-col items-center justify-center p-2 border-4 border-b-8 transition-all duration-500 ${tile.color} ${isCurrent ? 'shadow-lg scale-110 border-orange-400 z-10 bg-white' : 'opacity-90 hover:scale-105 hover:z-10'}`} style={{ borderRadius: tile.borderRadius }}>
                      <div className="absolute top-2 left-3 bg-white/80 text-[10px] font-black px-2 py-0.5 rounded-full shadow-sm text-gray-500 z-10">{index}</div>
                      
                      <TileDecorations type={tile.type} />
                      
                      {isCurrent ? (
                        <div className="w-20 h-24 md:w-24 md:h-28 absolute z-20 animate-bounce -top-10 drop-shadow-xl">
                          <CuteMonsterSprite type={activeCharData.type} isHappy={tile.points > 0} isSad={tile.points < 0} flowerLevel={flowerLevel} />
                        </div>
                      ) : (tile.animeIcon ? (
                        <div className="w-12 h-12 md:w-16 md:h-16 mb-1 z-10 drop-shadow-md hover:scale-110 transition-transform bg-white/60 p-1 rounded-full backdrop-blur-sm">
                          <AnimeGraphic type={tile.animeIcon} />
                        </div>
                      ) : null)}
                      
                      <h3 className={`text-sm md:text-[15px] font-black text-center mt-auto z-10 ${isCurrent ? 'mt-6 text-orange-600' : ''}`}>{tile.title}</h3>
                      <p className="text-[9px] md:text-[10px] font-bold text-center opacity-75 mt-1 z-10 bg-white/40 px-2 rounded-full">{tile.effect}</p>
                    </div>
                    {showRightArrow && <div className="absolute -right-3 z-0 hidden sm:block text-gray-300"><ArrowRight className="w-5 h-5" /></div>}
                    {showDownArrow && <div className="absolute -bottom-4 z-0 hidden sm:block text-gray-300 rotate-90"><ArrowRight className="w-5 h-5" /></div>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* 巨大骰子動畫 */}
          {giantDice.show && (
            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/40 backdrop-blur-sm">
              <div className="flex flex-col items-center">
                <div className={`w-36 h-36 bg-gradient-to-br from-white to-gray-100 rounded-3xl border-b-8 border-gray-300 shadow-2xl flex items-center justify-center transition-all ${giantDice.isRolling ? 'animate-dice-tumble blur-[0.5px]' : 'animate-bounce scale-110 ring-8 ring-sky-200'}`}>
                  <DiceDots number={giantDice.number} />
                </div>
                {!giantDice.isRolling && <div className="mt-10 bg-white/90 px-8 py-3 rounded-full text-3xl font-black text-sky-600 shadow-xl border-4 border-sky-200 animate-pulse">前進 {giantDice.number} 步！</div>}
              </div>
            </div>
          )}

          {/* 互動關卡 Modal */}
          {modalData && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
              
              {/* 1. 雲朵填空格 */}
              {modalData.type === 'interactive' && (
                <div className="bg-white p-5 md:p-8 max-w-md w-full shadow-2xl relative border-[6px] border-blue-300 cloud-shape transform transition-all scale-100 opacity-100 max-h-[90vh] overflow-y-auto modal-scroll">
                  <h2 className="text-2xl font-black text-blue-500 mb-2 text-center">{modalData.title}</h2>
                  <p className="text-gray-600 font-bold mb-4 text-center">{modalData.question}</p>
                  
                  <div className="relative mb-4">
                    <textarea 
                        value={inputText} 
                        onChange={e => { setInputText(e.target.value); setModalError(""); }} 
                        className="w-full bg-blue-50 border-4 border-blue-100 rounded-3xl p-4 text-lg font-bold text-gray-700 h-28 resize-none focus:outline-none focus:border-blue-400 shadow-inner" 
                        placeholder="點擊下方表情或打字..."
                    ></textarea>
                  </div>

                  {modalError && <p className="text-red-500 text-sm font-bold mb-2 text-center animate-pulse">{modalError}</p>}
                  
                  <div className="flex justify-center gap-2 flex-wrap mb-6">
                    {(modalData.customEmojis || EMOJI_LIST).map(emojiStr => (
                      <button key={emojiStr} onClick={(e) => handleEmojiClick(e, emojiStr)} className="bg-white border-2 border-blue-200 px-3 py-2 rounded-full shadow-sm hover:bg-blue-100 hover:scale-110 active:scale-95 transition-all text-sm font-bold text-gray-700">
                        {emojiStr}
                      </button>
                    ))}
                  </div>

                  {modalData.tip && <LearningTip text={modalData.tip} />}
                  <button onClick={handleCloseModal} className="w-full py-4 bg-blue-500 text-white rounded-full font-black text-lg shadow-[0_6px_0_#2563eb] hover:translate-y-1 hover:shadow-[0_2px_0_#2563eb] active:translate-y-2 active:shadow-none transition-all">確認並前進</button>
                </div>
              )}

              {/* 飛行特效 */}
              {flyingEmojis.map(item => (
                <div key={item.id} className="fixed text-4xl z-[100] animate-fly-emoji pointer-events-none drop-shadow-md" style={{ left: item.x - 20, top: item.y - 20, '--tx': `calc(50vw - ${item.x}px)`, '--ty': `calc(40vh - ${item.y}px)` }}>
                  {item.emoji}
                </div>
              ))}

              {/* 2. 誇張行動反饋 */}
              {(modalData.type === 'auto_action_pos' || modalData.type === 'auto_action_neg') && (
                <div className={`bg-white rounded-3xl p-5 md:p-8 max-w-sm w-full text-center border-8 ${modalData.points > 0 ? 'border-pink-300' : 'border-gray-400'} shadow-2xl max-h-[90vh] overflow-y-auto modal-scroll`}>
                  {modalData.points > 0 ? (
                    <div className="relative w-28 h-28 md:w-32 md:h-32 mx-auto mb-4 bg-pink-50 rounded-full flex items-center justify-center border-4 border-pink-200 shrink-0">
                      <Heart className="w-14 h-14 md:w-16 md:h-16 text-pink-500 animate-[bounce_1s_infinite]" fill="#ec4899" />
                      <Sparkles className="absolute top-0 right-0 w-8 h-8 md:w-10 md:h-10 text-yellow-400 animate-ping" />
                      <Sparkles className="absolute bottom-2 left-0 w-6 h-6 md:w-8 md:h-8 text-yellow-400 animate-pulse" />
                    </div>
                  ) : (
                    <div className="relative w-28 h-28 md:w-32 md:h-32 mx-auto mb-4 bg-gray-100 rounded-full flex flex-col items-center justify-center border-4 border-gray-300 overflow-hidden shadow-inner shrink-0">
                      <div className="absolute top-2 w-14 h-8 md:w-16 md:h-10 opacity-30"><Cloud className="w-full h-full text-gray-800" fill="currentColor"/></div>
                      <div className="absolute top-4 right-6 md:right-8 text-3xl md:text-4xl animate-bounce">⚡</div>
                      <div className="w-16 h-20 md:w-20 md:h-24 mt-4 opacity-80"><CuteMonsterSprite type={activeCharData.type} isSad={true} flowerLevel={flowerLevel} /></div>
                    </div>
                  )}
                  <h2 className="text-2xl md:text-3xl font-black mb-2 text-gray-800">{modalData.title}</h2>
                  <p className="text-gray-600 font-bold mb-4 text-sm md:text-base">{modalData.desc}</p>
                  <div className={`inline-block px-5 py-2 rounded-full font-black mb-4 md:mb-6 text-sm md:text-lg border-2 shadow-sm ${modalData.points > 0 ? 'bg-pink-100 text-pink-600 border-pink-300' : 'bg-gray-100 text-gray-700 border-gray-300'}`}>
                    {modalData.points > 0 ? `獲得 ${modalData.points} 點！${modalData.effect}` : `被扣 ${Math.abs(modalData.points)} 點... ${modalData.effect}`}
                  </div>
                  {modalData.tip && <LearningTip text={modalData.tip} />}
                  <button onClick={handleCloseModal} className="w-full py-3 md:py-4 bg-gray-800 text-white rounded-full font-black text-lg md:text-xl hover:bg-gray-700 active:scale-95 transition-all">繼續</button>
                </div>
              )}

              {/* 3. 3D 命運骰子 */}
              {modalData.type === 'chance' && (
                <div className="bg-fuchsia-50 rounded-[3rem] p-5 md:p-8 max-w-sm w-full text-center border-8 border-purple-300 shadow-2xl relative overflow-hidden max-h-[90vh] overflow-y-auto modal-scroll">
                  <div className="absolute -top-10 -right-10 text-purple-200 opacity-50"><Sparkles size={120} /></div>
                  <h2 className="text-2xl md:text-3xl font-black text-purple-700 mb-4 md:mb-6 drop-shadow-sm">命運骰子</h2>
                  {modalError && <p className="text-red-500 text-sm font-bold mb-2 animate-pulse">{modalError}</p>}
                  
                  {!fateResult ? (
                    <div className="flex justify-center py-4 md:py-6 mb-4 md:mb-6">
                      <button onClick={rollFateDice} disabled={isRollingFate} className="relative group outline-none shrink-0">
                        <div className={`w-28 h-28 md:w-36 md:h-36 bg-gradient-to-br from-purple-500 to-fuchsia-600 rounded-3xl shadow-[0_12px_0_#7e22ce] flex items-center justify-center text-white border-4 border-purple-300 ${isRollingFate ? 'animate-dice-tumble scale-90 shadow-none translate-y-3 blur-[0.5px]' : 'hover:scale-105 active:translate-y-3 active:shadow-none transition-all'}`}>
                          <Dices className="w-16 h-16 md:w-20 md:h-20 drop-shadow-md" />
                        </div>
                        {!isRollingFate && <span className="absolute -bottom-8 left-1/2 transform -translate-x-1/2 text-purple-700 font-black whitespace-nowrap bg-white px-4 py-1 rounded-full border-2 border-purple-200 shadow-sm animate-bounce text-sm md:text-base">點擊擲骰！</span>}
                      </button>
                    </div>
                  ) : (
                    <div className="bg-white p-5 rounded-3xl border-4 border-purple-200 shadow-lg mb-4 md:mb-6 animate-[bounce_0.5s_ease-out]">
                      <h3 className="text-xl md:text-2xl font-black text-gray-800 mb-2">{fateResult.title}</h3>
                      <p className="text-purple-600 font-bold mb-4 text-sm md:text-base">{fateResult.desc}</p>
                      <p className="text-white font-black bg-purple-500 py-2 rounded-xl text-base md:text-lg shadow-inner">{fateResult.effect}</p>
                    </div>
                  )}

                  {modalData.tip && <LearningTip text={modalData.tip} />}
                  {fateResult && <button onClick={handleCloseModal} className="w-full py-3 md:py-4 bg-purple-600 text-white rounded-full font-black text-lg md:text-xl shadow-[0_6px_0_#7e22ce] hover:translate-y-1 hover:shadow-[0_2px_0_#7e22ce] active:translate-y-2 active:shadow-none transition-all mt-2">接受命運！</button>}
                </div>
              )}

              {/* 4. 星空營火 */}
              {modalData.type === 'rest' && (
                <div className="bg-slate-900 rounded-[3rem] p-5 md:p-8 max-w-sm w-full text-center border-8 border-slate-700 shadow-[0_0_50px_rgba(251,146,60,0.3)] relative overflow-hidden max-h-[90vh] overflow-y-auto modal-scroll">
                  <div className="absolute top-6 left-6 text-yellow-100 opacity-60 text-lg animate-pulse">✨</div>
                  <div className="absolute top-12 right-10 text-yellow-100 opacity-40 text-sm animate-pulse">✨</div>
                  <div className="absolute top-24 left-1/2 text-yellow-100 opacity-30 text-xs animate-pulse">✨</div>
                  <h2 className="text-2xl md:text-3xl font-black text-orange-300 mb-2 drop-shadow-md">星空療癒站</h2>
                  <p className="text-slate-400 mb-6 md:mb-8 font-bold text-sm md:text-base">夜深了，讓心情休息一下...</p>
                  
                  <div className="flex justify-center mb-6 md:mb-8 relative shrink-0">
                    <button onClick={clickFire} className={`relative z-10 transition-all duration-500 outline-none ${isResting ? 'scale-110' : 'hover:scale-105'}`}>
                      <div className={`w-28 h-28 md:w-32 md:h-32 rounded-full flex items-center justify-center transition-all duration-700 ${isResting ? 'bg-orange-500/20 shadow-[0_0_60px_rgba(251,146,60,0.6)] border-2 border-orange-500/50' : 'bg-slate-800 border-4 border-slate-700'}`}>
                        <Flame className={`w-14 h-14 md:w-16 md:h-16 transition-all duration-500 ${isResting ? 'text-orange-400 animate-pulse' : 'text-orange-900'}`} fill={isResting ? '#fb923c' : 'transparent'} />
                      </div>
                    </button>
                  </div>

                  {!isResting ? (
                    <div onClick={clickFire} className="bg-orange-900/40 border-2 border-orange-800 py-3 px-5 md:px-6 rounded-full cursor-pointer inline-block mb-4 md:mb-6">
                      <p className="text-orange-300 font-black animate-pulse text-sm md:text-base">👆 點擊營火，感受溫暖</p>
                    </div>
                  ) : (
                    <div className="bg-slate-800 p-4 md:p-5 rounded-3xl border-2 border-slate-700 mb-4 md:mb-6 shadow-inner">
                      <p className="text-orange-300 font-black animate-pulse text-lg md:text-xl mb-1 tracking-widest">🎶 劈啪... 劈啪...</p>
                      <p className="text-slate-400 font-bold text-xs md:text-sm">深呼吸，聽著柴火聲放鬆肩膀</p>
                    </div>
                  )}

                  {modalData.tip && <LearningTip text={modalData.tip} />}
                  <button onClick={handleCloseModal} className="w-full py-3 md:py-4 bg-slate-700 text-orange-200 rounded-full font-black text-lg md:text-xl border-b-4 border-slate-600 active:border-b-0 active:translate-y-1 transition-all mt-2">休息夠了，出發！</button>
                </div>
              )}

              {/* 5. 合作打怪獸 */}
              {modalData.type === 'monster' && (
                 <div className="bg-slate-900 rounded-3xl p-4 sm:p-6 md:p-8 max-w-md w-full text-center border-8 border-slate-700 shadow-2xl max-h-[90vh] overflow-y-auto modal-scroll">
                   <h2 className="text-2xl md:text-3xl font-black text-red-400 mb-2">{modalData.title}</h2>
                   <p className="text-slate-300 font-medium mb-4 text-sm md:text-base">怪獸擋住了去路！點擊舒緩卡片安撫牠！</p>
                   
                   <div className="relative w-28 h-28 md:w-40 md:h-40 mx-auto mb-6 bg-slate-800 rounded-full flex flex-col items-center justify-center border-4 border-slate-600 shrink-0">
                     <MonsterSprite isHit={monsterHit} type={modalData.monsterType} />
                     <div className="absolute -bottom-4 bg-slate-800 border-2 border-slate-600 px-3 py-1 rounded-full flex gap-1 shadow-lg">
                       {[...Array(3)].map((_, i) => <Heart key={i} className={`w-5 h-5 md:w-6 md:h-6 ${i < monsterHP ? 'text-red-500' : 'text-slate-600 opacity-50'}`} fill={i < monsterHP ? 'currentColor' : 'transparent'} />)}
                     </div>
                   </div>
                   
                   {monsterHP > 0 ? (
                     <div className="flex gap-2 justify-center mb-4">
                       <button onClick={hitMonster} className="flex-1 bg-cyan-900 border-2 border-cyan-500 text-cyan-200 py-2 md:py-3 rounded-2xl font-bold active:scale-95 flex flex-col items-center gap-1 text-sm"><Droplets className="w-5 h-5"/> 喝口水</button>
                       <button onClick={hitMonster} className="flex-1 bg-emerald-900 border-2 border-emerald-500 text-emerald-200 py-2 md:py-3 rounded-2xl font-bold active:scale-95 flex flex-col items-center gap-1 text-sm"><Wind className="w-5 h-5"/> 深呼吸</button>
                       <button onClick={hitMonster} className="flex-1 bg-yellow-900 border-2 border-yellow-500 text-yellow-200 py-2 md:py-3 rounded-2xl font-bold active:scale-95 flex flex-col items-center gap-1 text-sm"><Smile className="w-5 h-5"/> 數到十</button>
                     </div>
                   ) : (
                     <div className="bg-green-900 border-2 border-green-500 p-3 md:p-4 rounded-2xl mb-4">
                       <h3 className="text-green-400 font-black text-lg md:text-xl">成功安撫怪獸！</h3>
                       <p className="text-green-200 text-sm">獲得 {modalData.points} 點勇氣點數！</p>
                     </div>
                   )}
                   
                   {modalData.tip && <LearningTip text={modalData.tip} />}
                   {monsterHP === 0 && <button onClick={handleCloseModal} className="w-full py-3 md:py-4 bg-green-600 text-white rounded-full font-black text-lg md:text-xl shadow-lg hover:bg-green-700 mt-2">勝利前進！</button>}
                 </div>
              )}

            </div>
          )}
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
