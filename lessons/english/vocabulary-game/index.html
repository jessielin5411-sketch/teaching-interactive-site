<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>國小單字大挑戰</title>
  <style>
    :root{--ink:#24445a;--teal:#17858c;--yellow:#ffc84d;--pink:#f26e86;--green:#35a66f;--red:#e45454;--line:#d5e5e7;--shadow:0 7px 0 rgba(36,68,90,.15)}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Segoe UI","Noto Sans TC",system-ui,sans-serif;background:radial-gradient(circle at 10% 20%,rgba(255,200,77,.28) 0 4px,transparent 5px),linear-gradient(135deg,#e9faf8,#fff8df);background-size:90px 90px,auto}button{font:inherit;cursor:pointer}.hidden{display:none!important}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px clamp(14px,4vw,32px);color:#fff;background:var(--teal)}.top a{color:#fff;text-decoration:none;font-weight:900}.sound{border:2px solid #fff;border-radius:10px;color:#fff;background:transparent;padding:8px 12px;font-weight:900}.shell{width:min(900px,calc(100% - 24px));margin:0 auto;padding:28px 0 50px}.panel{padding:clamp(22px,5vw,40px);border:3px solid var(--teal);border-radius:24px;background:rgba(255,255,255,.96);box-shadow:var(--shadow);text-align:center}.hero{font-size:90px;animation:bob 1.8s ease-in-out infinite}h1,h2,p{margin-top:0}h1{font-size:clamp(40px,8vw,70px);line-height:1.05}.lead{max-width:650px;margin:0 auto 22px;color:#657986;font-size:18px;line-height:1.65;font-weight:650}.primary{min-height:52px;padding:0 24px;border:0;border-radius:14px;color:#fff;background:var(--pink);font-weight:950;box-shadow:var(--shadow)}.hud{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;margin-bottom:18px;font-weight:950}.progress{height:16px;overflow:hidden;border:2px solid #bdd7d9;border-radius:999px;background:#e9f2f2}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--yellow),var(--pink));transition:width .3s}.hearts{color:var(--red);font-size:22px}.score{font-size:20px}.type{display:inline-block;padding:7px 12px;border-radius:999px;color:#fff;background:var(--teal);font-weight:900}.prompt{margin:18px 0 8px;font-size:20px;font-weight:850}.word{min-height:105px;display:grid;place-items:center;margin:10px 0 20px;font-size:clamp(42px,9vw,76px);font-weight:950;color:var(--teal)}.emoji{font-size:92px}.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}.option{min-height:68px;padding:12px;border:2px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);font-size:19px;font-weight:850;box-shadow:0 5px 0 rgba(36,68,90,.11)}.option:hover{border-color:var(--teal);background:#effafa}.option.correct{color:#fff;border-color:#24794f;background:var(--green)}.option.wrong{color:#fff;border-color:#a53c3c;background:var(--red)}.feedback{margin-top:16px;padding:14px;border-radius:12px;background:#fff2bf;font-weight:850}.next{margin-top:16px}.result-score{font-size:75px;color:var(--pink);font-weight:950}@keyframes bob{50%{transform:translateY(-9px) rotate(4deg)}}@media(max-width:650px){.options{grid-template-columns:1fr}.hud{grid-template-columns:1fr auto}.score{grid-column:1/-1}}
  </style>
</head>
<body>
  <header class="top"><a href="../index.html">← 返回英文活動</a><strong>English Vocabulary Challenge</strong><button class="sound" id="soundButton">🔊 音效</button></header>
  <main class="shell">
    <section class="panel" id="startScreen"><div class="hero">🧙‍♀️📚</div><h1>國小單字大挑戰</h1><p class="lead">完成 10 題單字任務！看圖片、讀中文、聽發音，選出正確的英文單字。</p><button class="primary" id="startButton">開始挑戰 Start!</button></section>
    <section class="panel hidden" id="gameScreen"><div class="hud"><div class="progress"><span id="progressBar"></span></div><div class="hearts" id="hearts">♥ ♥ ♥</div><div class="score">⭐ <span id="score">0</span></div></div><span class="type" id="type"></span><p class="prompt" id="prompt"></p><div class="word" id="word"></div><div class="options" id="options"></div><div class="feedback hidden" id="feedback"></div><button class="primary next hidden" id="nextButton">下一題 Next</button></section>
    <section class="panel hidden" id="resultScreen"><div class="hero" id="resultEmoji">🏆</div><h2 id="resultTitle"></h2><div class="result-score"><span id="finalScore"></span> 分</div><p class="lead" id="resultText"></p><button class="primary" id="retryButton">再玩一次 Play Again</button></section>
  </main>
  <script>
    const words=[["apple","蘋果","🍎"],["book","書","📕"],["cat","貓","🐱"],["dog","狗","🐶"],["fish","魚","🐟"],["school","學校","🏫"],["teacher","老師","🧑‍🏫"],["pencil","鉛筆","✏️"],["banana","香蕉","🍌"],["bus","公車","🚌"],["sun","太陽","☀️"],["moon","月亮","🌙"],["water","水","💧"],["chair","椅子","🪑"],["bird","鳥","🐦"]];
    let round=[],index=0,score=0,hearts=3,answered=false,soundOn=true;
    const $=id=>document.getElementById(id),shuffle=a=>[...a].sort(()=>Math.random()-.5);
    function speak(text){if(!soundOn||!("speechSynthesis" in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=.8;speechSynthesis.speak(u)}
    function setScreen(id){["startScreen","gameScreen","resultScreen"].forEach(x=>$(x).classList.toggle("hidden",x!==id))}
    function start(){round=shuffle(words).slice(0,10).map((w,i)=>({word:w,mode:i%3}));index=0;score=0;hearts=3;setScreen("gameScreen");render()}
    function render(){answered=false;const q=round[index],correct=q.word[0],wrong=shuffle(words.filter(w=>w[0]!==correct)).slice(0,3).map(w=>w[0]);$("progressBar").style.width=`${index/10*100}%`;$("hearts").textContent="♥ ".repeat(hearts).trim();$("score").textContent=score;$("feedback").classList.add("hidden");$("nextButton").classList.add("hidden");if(q.mode===0){$("type").textContent="看圖選字";$("prompt").textContent="Which word matches the picture?";$("word").innerHTML=`<span class="emoji">${q.word[2]}</span>`}else if(q.mode===1){$("type").textContent="英翻中";$("prompt").textContent=`「${q.word[1]}」的英文是哪一個？`;$("word").textContent=q.word[1]}else{$("type").textContent="聽音選字";$("prompt").textContent="Listen and choose the word.";$("word").innerHTML="🔊 點我聽單字";$("word").onclick=()=>speak(correct);setTimeout(()=>speak(correct),250)}const box=$("options");box.innerHTML="";shuffle([correct,...wrong]).forEach(text=>{const b=document.createElement("button");b.className="option";b.textContent=text;b.onclick=()=>answer(b,text,correct,q.word[1]);box.appendChild(b)})}
    function answer(button,text,correct,chinese){if(answered)return;answered=true;const ok=text===correct;document.querySelectorAll(".option").forEach(b=>{b.disabled=true;if(b.textContent===correct)b.classList.add("correct")});if(ok){score+=10;button.classList.add("correct");speak(correct)}else{hearts--;button.classList.add("wrong")}const f=$("feedback");f.textContent=ok?`Great! ${correct} 是「${chinese}」。`:`正確答案是 ${correct}，意思是「${chinese}」。`;f.classList.remove("hidden");$("score").textContent=score;$("hearts").textContent="♥ ".repeat(hearts).trim();$("nextButton").textContent=hearts<=0||index===9?"查看結果 Result":"下一題 Next";$("nextButton").classList.remove("hidden")}
    function next(){if(hearts<=0||index===9)return finish();index++;render()}
    function finish(){setScreen("resultScreen");$("finalScore").textContent=score;if(score>=80){$("resultEmoji").textContent="🏆";$("resultTitle").textContent="Vocabulary Star!";$("resultText").textContent="太棒了！你已經是英文單字小高手。"}else{$("resultEmoji").textContent="🌱";$("resultTitle").textContent="Keep Going!";$("resultText").textContent="再練習一次，你會記住更多英文單字！"}}
    $("startButton").onclick=start;$("nextButton").onclick=next;$("retryButton").onclick=start;$("soundButton").onclick=()=>{soundOn=!soundOn;$("soundButton").textContent=soundOn?"🔊 音效":"🔇 靜音"};
  </script>
</body>
</html>
