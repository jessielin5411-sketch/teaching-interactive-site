<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>進階單字探險隊</title>
  <style>
    :root{--ink:#28334d;--purple:#6955b5;--gold:#f1b943;--pink:#e86591;--green:#319568;--red:#d94f55;--line:#ddd8ed;--shadow:0 7px 0 rgba(40,51,77,.16)}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Segoe UI","Noto Sans TC",system-ui,sans-serif;background:radial-gradient(circle at 15% 18%,rgba(241,185,67,.3) 0 4px,transparent 5px),linear-gradient(135deg,#eeeafe,#fff5df);background-size:95px 95px,auto}button{font:inherit;cursor:pointer}.hidden{display:none!important}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px clamp(14px,4vw,32px);color:#fff;background:var(--purple);border-bottom:5px solid var(--gold)}.top a{color:#fff;text-decoration:none;font-weight:900}.sound{border:2px solid #fff;border-radius:10px;color:#fff;background:transparent;padding:8px 12px;font-weight:900}.shell{width:min(940px,calc(100% - 24px));margin:0 auto;padding:28px 0 50px}.panel{padding:clamp(22px,5vw,40px);border:3px solid var(--purple);border-radius:24px;background:rgba(255,255,255,.97);box-shadow:var(--shadow);text-align:center}.hero{font-size:92px;animation:bob 1.8s ease-in-out infinite}h1,h2,p{margin-top:0}h1{font-size:clamp(38px,8vw,68px);line-height:1.05}.lead{max-width:700px;margin:0 auto 22px;color:#697087;font-size:18px;line-height:1.7;font-weight:650}.primary{min-height:52px;padding:0 24px;border:0;border-radius:14px;color:#fff;background:var(--pink);font-weight:950;box-shadow:var(--shadow)}.hud{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;margin-bottom:18px;font-weight:950}.progress{height:16px;overflow:hidden;border:2px solid #cec5e6;border-radius:999px;background:#f0edf7}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--pink),var(--purple));transition:width .3s}.hearts{color:var(--red);font-size:22px}.score{font-size:20px}.type{display:inline-block;padding:7px 13px;border-radius:999px;color:#fff;background:var(--purple);font-weight:900}.prompt{margin:22px auto 10px;max-width:820px;color:#171a22;font-size:clamp(28px,4.5vw,38px);line-height:1.5;font-weight:950;text-shadow:0 2px 0 rgba(255,255,255,.8)}.focus{min-height:58px;display:grid;place-items:center;margin:5px auto 20px;padding:8px 14px;color:var(--purple);font-size:clamp(18px,3vw,25px);font-weight:800;opacity:.82}.listen{max-width:420px;border:2px dashed var(--purple);border-radius:14px;background:#f5f1ff;cursor:pointer}.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}.option{min-height:72px;padding:13px;border:2px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);font-size:18px;font-weight:850;line-height:1.45;box-shadow:0 5px 0 rgba(40,51,77,.11)}.option:hover{border-color:var(--purple);background:#f5f1ff}.option.correct{color:#fff;border-color:#26774f;background:var(--green)}.option.wrong{color:#fff;border-color:#a43a40;background:var(--red)}.feedback{margin-top:16px;padding:15px;border-radius:12px;background:#fff1bd;font-weight:850;line-height:1.6}.next{margin-top:16px}.result-score{font-size:75px;color:var(--pink);font-weight:950}.name-row{display:flex;justify-content:center;gap:10px;max-width:560px;margin:20px auto}.name-row input{min-width:0;flex:1;padding:12px 14px;border:2px solid var(--line);border-radius:12px;font:inherit}.certificate{margin-top:26px;padding:32px;border:10px double var(--gold);border-radius:12px;background:#fffdf6}.certificate h2{color:var(--purple);font-size:36px}.certificate-name{margin:18px 0;color:var(--pink);font-size:clamp(38px,8vw,64px);font-weight:950}.certificate-actions{display:flex;justify-content:center;gap:10px;margin-top:18px}@keyframes bob{50%{transform:translateY(-9px) rotate(-3deg)}}@media(max-width:680px){.options{grid-template-columns:1fr}.hud{grid-template-columns:1fr auto}.score{grid-column:1/-1}.name-row{flex-direction:column}.prompt{font-size:27px}.focus{font-size:18px}}@media print{body{background:#fff}.top,.result-summary,.certificate-actions{display:none!important}.panel{border:0;box-shadow:none}.certificate{display:block!important}}
  </style>
</head>
<body>
  <header class="top"><a href="../index.html">← 返回英文活動</a><strong>Advanced Vocabulary Quest</strong><button class="sound" id="soundButton">🔊 音效</button></header>
  <main class="shell">
    <section class="panel" id="startScreen"><div class="hero">🧭📖</div><h1>進階單字探險隊</h1><p class="lead">適合五、六年級。運用情境、定義、拼字與聽力線索，找出正確單字並完成 10 題探險任務！</p><button class="primary" id="startButton">開始進階挑戰</button></section>
    <section class="panel hidden" id="gameScreen"><div class="hud"><div class="progress"><span id="progressBar"></span></div><div class="hearts" id="hearts">♥ ♥ ♥</div><div class="score">⭐ <span id="score">0</span></div></div><span class="type" id="type"></span><p class="prompt" id="prompt"></p><div class="focus" id="focus"></div><div class="options" id="options"></div><div class="feedback hidden" id="feedback"></div><button class="primary next hidden" id="nextButton">下一題 Next</button></section>
    <section class="panel hidden" id="resultScreen"><div class="result-summary"><div class="hero" id="resultEmoji">🏆</div><h2 id="resultTitle"></h2><div class="result-score"><span id="finalScore"></span> 分</div><p class="lead" id="resultText"></p><div class="name-row hidden" id="nameRow"><input id="studentName" maxlength="20" placeholder="輸入英語小達人姓名"><button class="primary" id="certificateButton">領取證書</button></div><button class="primary" id="retryButton">再次挑戰</button></div><div class="certificate hidden" id="certificate"><p>English Vocabulary Achievement Certificate</p><h2>英語小達人證書</h2><div class="certificate-name" id="certificateName"></div><p>完成進階單字探險隊挑戰，展現優秀的英文單字理解與應用能力。</p><p id="certificateScore"></p><div class="certificate-actions"><button class="primary" id="printButton">列印證書</button></div></div></section>
  </main>
  <script>
    const words=[
      {w:"adventure",zh:"冒險",def:"an exciting or unusual experience",sent:"Our class went on an exciting ____ in the forest."},
      {w:"careful",zh:"小心的",def:"giving attention to avoid mistakes or danger",sent:"Be ____ when you cross the busy street."},
      {w:"delicious",zh:"美味的",def:"having a very pleasant taste",sent:"Grandma made a ____ apple pie."},
      {w:"different",zh:"不同的",def:"not the same as another person or thing",sent:"The twins like ____ kinds of music."},
      {w:"environment",zh:"環境",def:"the natural world and the place around us",sent:"We should protect the ____ by using less plastic."},
      {w:"important",zh:"重要的",def:"having great value or meaning",sent:"It is ____ to drink enough water every day."},
      {w:"interesting",zh:"有趣的",def:"holding your attention because it is exciting",sent:"The science experiment was very ____."},
      {w:"language",zh:"語言",def:"a system of words used by people to communicate",sent:"English is a ____ spoken in many countries."},
      {w:"practice",zh:"練習",def:"to do something repeatedly to improve",sent:"You need to ____ the piano every day."},
      {w:"probably",zh:"很可能",def:"likely to happen or be true",sent:"It will ____ rain this afternoon, so bring an umbrella."},
      {w:"remember",zh:"記得",def:"to keep something in your mind",sent:"Please ____ to bring your homework tomorrow."},
      {w:"surprised",zh:"感到驚訝的",def:"feeling amazed because something is unexpected",sent:"I was ____ when my friends planned a party for me."},
      {w:"together",zh:"一起",def:"with another person or in a group",sent:"We worked ____ to finish the class project."},
      {w:"weather",zh:"天氣",def:"the condition of the air outside",sent:"The ____ is sunny and warm today."},
      {w:"healthy",zh:"健康的",def:"in good physical condition",sent:"Eating vegetables helps us stay ____."},
      {w:"library",zh:"圖書館",def:"a place where people can read or borrow books",sent:"I borrowed a mystery book from the ____."},
      {w:"message",zh:"訊息",def:"information sent from one person to another",sent:"Dad left a ____ on my desk."},
      {w:"question",zh:"問題",def:"something that you ask to get an answer",sent:"Raise your hand if you have a ____."},
      {w:"because",zh:"因為",def:"for the reason that",sent:"We stayed inside ____ it was raining."},
      {w:"favorite",zh:"最喜愛的",def:"liked more than all others",sent:"Blue is my ____ color."}
    ];
    const contextWrong={adventure:["message","question","weather"],careful:["delicious","together","probably"],delicious:["careful","different","surprised"],different:["delicious","probably","together"],environment:["language","library","message"],important:["delicious","probably","together"],interesting:["careful","healthy","surprised"],language:["weather","message","library"],practice:["remember","because","favorite"],probably:["together","careful","delicious"],remember:["practice","because","weather"],surprised:["healthy","different","careful"],together:["probably","delicious","important"],weather:["language","question","message"],healthy:["surprised","different","interesting"],library:["environment","language","message"],message:["question","weather","adventure"],question:["message","adventure","environment"],because:["practice","remember","favorite"],favorite:["because","practice","remember"]};
    let round=[],index=0,score=0,hearts=3,answered=false,soundOn=true;
    const $=id=>document.getElementById(id),shuffle=a=>[...a].sort(()=>Math.random()-.5);
    function speak(text){if(!soundOn||!("speechSynthesis" in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=.78;speechSynthesis.speak(u)}
    function setScreen(id){["startScreen","gameScreen","resultScreen"].forEach(x=>$(x).classList.toggle("hidden",x!==id))}
    function start(){round=shuffle(words).slice(0,10).map((word,i)=>({word,mode:i%4}));index=0;score=0;hearts=3;setScreen("gameScreen");render()}
    function spellingChoices(word){const variants=new Set([word]);for(let i=0;i<word.length-1&&variants.size<4;i++){const a=word.split("");[a[i],a[i+1]]=[a[i+1],a[i]];const v=a.join("");if(v!==word)variants.add(v)}for(let i=1;i<word.length&&variants.size<4;i++)variants.add(word.slice(0,i)+word[i-1]+word.slice(i));return shuffle([...variants].slice(0,4))}
    function wordChoices(correct,context=false){const wrong=context?contextWrong[correct.w]:shuffle(words.filter(x=>x.w!==correct.w)).slice(0,3).map(x=>x.w);return shuffle([correct.w,...wrong])}
    function render(){answered=false;const q=round[index],w=q.word;$("progressBar").style.width=`${index/10*100}%`;$("hearts").textContent="♥ ".repeat(hearts).trim();$("score").textContent=score;$("feedback").classList.add("hidden");$("nextButton").classList.add("hidden");$("focus").className="focus";let choices;if(q.mode===0){$("type").textContent="情境填空";$("prompt").textContent=w.sent;$("focus").textContent="Choose the best word.";choices=wordChoices(w,true)}else if(q.mode===1){$("type").textContent="英文定義";$("prompt").textContent=w.def;$("focus").textContent="Which word matches the definition?";choices=wordChoices(w)}else if(q.mode===2){$("type").textContent="拼字判斷";$("prompt").textContent=`哪一個是「${w.zh}」的正確拼字？`;$("focus").textContent=w.zh;choices=spellingChoices(w.w)}else{$("type").textContent="聽音辨字";$("prompt").textContent="Listen carefully and choose the word.";$("focus").textContent="🔊 Click to listen";$("focus").classList.add("listen");$("focus").onclick=()=>speak(w.w);setTimeout(()=>speak(w.w),250);choices=wordChoices(w)}const box=$("options");box.innerHTML="";choices.forEach(text=>{const b=document.createElement("button");b.className="option";b.textContent=text;b.onclick=()=>answer(b,text,w);box.appendChild(b)})}
    function answer(button,text,w){if(answered)return;answered=true;const ok=text===w.w;document.querySelectorAll(".option").forEach(b=>{b.disabled=true;if(b.textContent===w.w)b.classList.add("correct")});if(ok){score+=10;button.classList.add("correct");speak(w.w)}else{hearts--;button.classList.add("wrong")}const f=$("feedback");f.textContent=ok?`Excellent! ${w.w}：${w.zh}。例句：${w.sent.replace("____",w.w)}`:`正確答案是 ${w.w}，意思是「${w.zh}」。`;f.classList.remove("hidden");$("score").textContent=score;$("hearts").textContent="♥ ".repeat(hearts).trim();$("nextButton").textContent=hearts<=0||index===9?"查看結果":"下一題 Next";$("nextButton").classList.remove("hidden")}
    function next(){if(hearts<=0||index===9)return finish();index++;render()}
    function finish(){setScreen("resultScreen");$("certificate").classList.add("hidden");$("finalScore").textContent=score;if(score>=80&&index===9){$("resultEmoji").textContent="🏆";$("resultTitle").textContent="Advanced Word Master!";$("resultText").textContent="你已完成 10 題進階挑戰，可以領取英語小達人證書！";$("nameRow").classList.remove("hidden")}else{$("resultEmoji").textContent="🧭";$("resultTitle").textContent="Keep Exploring!";$("resultText").textContent="完成 10 題並達到 80 分，就能領取英語小達人證書。";$("nameRow").classList.add("hidden")}}
    function makeCertificate(){const name=$("studentName").value.trim();if(!name)return alert("請先輸入姓名");$("certificateName").textContent=name;$("certificateScore").textContent=`Advanced Vocabulary Quest：${score} 分`;$("certificate").classList.remove("hidden")}
    $("startButton").onclick=start;$("nextButton").onclick=next;$("retryButton").onclick=start;$("certificateButton").onclick=makeCertificate;$("printButton").onclick=()=>window.print();$("soundButton").onclick=()=>{soundOn=!soundOn;$("soundButton").textContent=soundOn?"🔊 音效":"🔇 靜音"};
  </script>
</body>
</html>
