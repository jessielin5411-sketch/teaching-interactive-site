<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>國中 2000 單字星艦任務</title>
  <style>
    :root{--bg:#07111f;--panel:#0d1b31;--panel2:#102846;--cyan:#22d3ee;--blue:#60a5fa;--violet:#a78bfa;--green:#34d399;--pink:#fb7185;--yellow:#facc15;--text:#e6f7ff;--muted:#9fb8cc;--line:rgba(125,211,252,.28)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);font-family:"Segoe UI","Noto Sans TC",system-ui,sans-serif;background:radial-gradient(circle at 18% 15%,rgba(96,165,250,.32),transparent 24%),radial-gradient(circle at 80% 10%,rgba(167,139,250,.28),transparent 25%),radial-gradient(circle at 70% 80%,rgba(34,211,238,.18),transparent 28%),linear-gradient(135deg,#050814,#08172b 48%,#0b1024);overflow-x:hidden}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,.9) 0 1px,transparent 1.8px),radial-gradient(circle,rgba(125,211,252,.8) 0 1px,transparent 1.6px);background-size:90px 90px,140px 140px;background-position:0 0,35px 45px;opacity:.35;animation:stars 18s linear infinite}
    @keyframes stars{to{background-position:180px 240px,215px 285px}}
    a{color:inherit;text-decoration:none}.back{position:fixed;top:16px;left:16px;z-index:20;display:inline-flex;gap:8px;align-items:center;padding:11px 16px;border:1px solid var(--line);border-radius:999px;background:rgba(8,18,34,.82);backdrop-filter:blur(10px);font-weight:900;color:#b8f3ff;box-shadow:0 0 24px rgba(34,211,238,.18)}
    .shell{width:min(1180px,calc(100% - 28px));margin:0 auto;padding:76px 0 46px}.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:22px;align-items:stretch}.panel{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,rgba(13,27,49,.88),rgba(8,18,34,.82));box-shadow:0 18px 50px rgba(0,0,0,.35),inset 0 0 0 1px rgba(255,255,255,.04);backdrop-filter:blur(10px)}
    .intro{padding:34px}.kicker{display:inline-flex;gap:8px;align-items:center;color:#a5f3fc;border:1px solid rgba(34,211,238,.35);background:rgba(34,211,238,.08);border-radius:999px;padding:8px 13px;font-size:14px;font-weight:900;letter-spacing:.08em}.intro h1{margin:18px 0 12px;font-size:clamp(38px,6vw,74px);line-height:1.02;text-shadow:0 0 26px rgba(34,211,238,.32)}.intro p{margin:0;color:var(--muted);font-size:18px;line-height:1.75;font-weight:650}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:22px}.stat{padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(255,255,255,.05)}.stat b{display:block;font-size:24px;color:#fff}.stat span{color:var(--muted);font-size:13px;font-weight:800}
    .status{padding:28px;display:flex;flex-direction:column;justify-content:space-between;gap:18px}.rank{font-size:72px;text-align:center;filter:drop-shadow(0 0 18px rgba(250,204,21,.42))}.meter{height:14px;border-radius:999px;overflow:hidden;background:#101827;border:1px solid rgba(255,255,255,.08)}.meter i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--green),var(--yellow));box-shadow:0 0 18px rgba(52,211,153,.55);transition:width .4s}.status h2{margin:0;text-align:center;font-size:28px}.status p{margin:0;text-align:center;color:var(--muted);line-height:1.6;font-weight:650}.bossGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0}.boss{display:grid;place-items:center;min-height:46px;border-radius:14px;background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.26);color:#b8f3ff;font-weight:1000;box-shadow:inset 0 0 16px rgba(34,211,238,.08)}.boss.defeated{background:rgba(52,211,153,.16);border-color:rgba(52,211,153,.55);color:#dcfce7;box-shadow:0 0 18px rgba(52,211,153,.18),inset 0 0 18px rgba(52,211,153,.12)}.boss .stageNo{font-size:13px;letter-spacing:.02em}.statusActions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:14px}.dangerBtn{color:#fff;background:linear-gradient(135deg,#fb7185,#f97316);box-shadow:0 8px 0 rgba(190,18,60,.35)}
    .levels{margin-top:24px;display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.level{position:relative;min-height:150px;padding:18px;border:1px solid rgba(125,211,252,.28);border-radius:22px;background:linear-gradient(160deg,rgba(16,40,70,.94),rgba(11,20,38,.92));box-shadow:0 10px 0 rgba(0,0,0,.22);transition:.18s;cursor:pointer}.level:hover{transform:translateY(-4px);border-color:rgba(34,211,238,.72)}.level.locked{filter:grayscale(.85);opacity:.55;cursor:not-allowed}.level.done{border-color:rgba(52,211,153,.75);box-shadow:0 0 24px rgba(52,211,153,.18),0 10px 0 rgba(0,0,0,.22)}.badge{display:flex;align-items:center;justify-content:space-between;gap:8px}.num{width:42px;height:42px;display:grid;place-items:center;border-radius:14px;background:linear-gradient(135deg,var(--cyan),var(--violet));color:#04111f;font-weight:1000}.lock{font-size:24px}.level h3{margin:15px 0 8px;font-size:20px}.level p{margin:0;color:var(--muted);font-size:14px;line-height:1.5;font-weight:650}.keyline{margin-top:12px;color:#fde68a;font-weight:900}
    .game{display:none;margin-top:24px;padding:24px}.game.active{display:block}.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-weight:900;color:#dffbff}.question{margin-top:18px;padding:24px;border-radius:24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}.prompt{font-size:clamp(24px,4vw,42px);font-weight:1000;line-height:1.2;margin:8px 0}.hint{color:#c4d8e8;font-size:17px;line-height:1.65;font-weight:650}.options{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px}.option,.primary,.ghost{border:0;border-radius:18px;padding:15px 16px;font:inherit;font-weight:900;cursor:pointer;transition:.16s}.option{text-align:left;color:#eafcff;background:rgba(96,165,250,.11);border:1px solid rgba(96,165,250,.28)}.option:hover{transform:translateY(-2px);background:rgba(34,211,238,.16);border-color:rgba(34,211,238,.62)}.option.correct{background:rgba(52,211,153,.25);border-color:var(--green)}.option.wrong{background:rgba(251,113,133,.22);border-color:var(--pink)}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.primary{color:#04111f;background:linear-gradient(135deg,var(--cyan),var(--green));box-shadow:0 8px 0 rgba(8,145,178,.35)}.ghost{color:#b8f3ff;background:rgba(255,255,255,.06);border:1px solid var(--line)}.feedback{margin-top:16px;min-height:58px;padding:14px 16px;border-radius:18px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.09);color:#dbeafe;font-weight:750;line-height:1.55}.inputAnswer{width:100%;margin-top:15px;padding:16px 18px;border-radius:18px;border:1px solid rgba(34,211,238,.46);background:rgba(2,8,23,.72);color:#fff;font-size:22px;font-weight:900;outline:none}.inputAnswer:focus{box-shadow:0 0 0 4px rgba(34,211,238,.16)}
    .modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(2,6,23,.74);backdrop-filter:blur(8px)}.modal.show{display:flex}.modalBox{width:min(680px,100%);max-height:92vh;overflow:auto;padding:30px;text-align:center}.modalBox h2{font-size:38px;margin:8px 0}.modalBox p{color:var(--muted);line-height:1.7;font-weight:700}.bigkey{font-size:88px;filter:drop-shadow(0 0 22px rgba(250,204,21,.58));animation:pulse 1.2s infinite alternate}.reviewBox{display:none;margin-top:16px;text-align:left}.reviewBox.show{display:block}.reviewBox h3{margin:0 0 10px;color:#fde68a}.reviewText{width:100%;min-height:150px;padding:14px;border-radius:16px;border:1px solid rgba(125,211,252,.28);background:rgba(2,8,23,.76);color:#e0f2fe;font:700 14px/1.55 "Segoe UI","Noto Sans TC",sans-serif;resize:vertical}.miniStatus{margin-top:12px;padding:12px;border-radius:16px;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.22);color:#a5f3fc;font-weight:850}.danger{background:linear-gradient(135deg,#fb7185,#f97316);box-shadow:0 8px 0 rgba(190,18,60,.35)}@keyframes pulse{to{transform:scale(1.08) rotate(5deg)}}
    @media(max-width:900px){.hero{grid-template-columns:1fr}.levels{grid-template-columns:repeat(2,1fr)}.options{grid-template-columns:1fr}}@media(max-width:560px){.shell{padding-top:70px}.levels{grid-template-columns:1fr}.stats{grid-template-columns:1fr}.intro,.status,.game{padding:20px}.back{position:absolute}}
  </style>
</head>
<body>
  <a class="back" href="../index.html">← 回英文首頁</a>
  <main class="shell">
    <section class="hero">
      <div class="panel intro">
        <span class="kicker">MISSION: JUNIOR HIGH 2000 WORDS</span>
        <h1>星艦單字解鎖任務</h1>
        <p>為國中生設計的 2000 單字練習挑戰。每一關 15 題，由淺入深練習；達到過關門檻即可取得能量鑰匙，解鎖下一個星區。累積鑰匙後可啟動進階拼字模式，像玩任務遊戲一樣把單字練熟。</p>
        <div class="stats">
          <div class="stat"><b>20</b><span>任務關卡</span></div>
          <div class="stat"><b>15</b><span>每關題數</span></div>
          <div class="stat"><b>12+</b><span>過關門檻</span></div>
        </div>
      </div>
      <aside class="panel status">
        <div>
          <div class="rank">🔑</div>
          <h2 id="rankTitle">Cadet Starter</h2>
          <p id="rankText">目前鑰匙：0 / 20。先完成第 1 關，啟動你的星艦字彙核心。</p>
          <div id="bossGrid" class="bossGrid"></div>
          <button class="ghost" id="resumeBtn" style="display:none;margin:16px auto 0">繼續上次任務</button>
          <div class="statusActions">
            <button class="ghost" id="restartAllBtn">重新闖關</button>
            <button class="primary dangerBtn" id="clearRecordBtn">清除紀錄</button>
          </div>
        </div>
        <div>
          <div class="meter"><i id="keyMeter"></i></div>
        </div>
      </aside>
    </section>

    <section id="levels" class="levels"></section>

    <section id="game" class="panel game">
      <div class="topbar">
        <span class="pill" id="missionName">Mission</span>
        <span class="pill" id="modeName">選擇題模式</span>
        <span class="pill" id="scoreText">0 / 15</span>
        <span class="pill" id="comboText">連擊 0</span>
      </div>
      <div class="meter" style="margin-top:16px"><i id="progressBar"></i></div>
      <div class="question">
        <div class="pill" id="questionNo">Q1</div>
        <div class="prompt" id="prompt"></div>
        <div class="hint" id="hint"></div>
        <div id="answerArea"></div>
        <div class="feedback" id="feedback">選出正確答案，啟動星艦翻譯核心。</div>
        <div class="actions">
          <button class="primary" id="submitBtn" style="display:none">送出答案</button>
          <button class="primary" id="nextBtn" style="display:none">下一題 →</button>
          <button class="ghost" id="soundBtn">聽發音</button>
          <button class="ghost" id="quitBtn">返回關卡艙</button>
        </div>
      </div>
    </section>
  </main>

  <div id="modal" class="modal">
    <div class="modalBox panel">
      <div class="bigkey" id="modalIcon">🔑</div>
      <h2 id="modalTitle">取得鑰匙！</h2>
      <p id="modalText"></p>
      <div id="reviewBox" class="reviewBox">
        <h3>錯題複習清單</h3>
        <textarea id="reviewText" class="reviewText" readonly></textarea>
        <div class="actions">
          <button class="ghost" id="copyReviewBtn">複製錯題清單</button>
          <button class="primary" id="retryWrongBtn">啟動錯題補救任務</button>
        </div>
        <div id="copyStatus" class="miniStatus" style="display:none">已複製，可以貼到文件中列印練習。</div>
      </div>
      <div class="actions" style="justify-content:center">
        <button class="primary" id="retryLevelBtn">重新挑戰一次</button>
        <button class="primary" id="modalBtn">回到任務地圖</button>
      </div>
    </div>
  </div>

  <script>
    const LEVELS = [
      {name:'Level 1 基礎生活艙', theme:'校園與日常', words:[['absent','缺席的'],['address','地址'],['afraid','害怕的'],['agree','同意'],['answer','答案；回答'],['arrive','到達'],['borrow','借入'],['busy','忙碌的'],['careful','小心的'],['choose','選擇'],['clean','乾淨的；打掃'],['clothes','衣服'],['country','國家；鄉下'],['dangerous','危險的'],['different','不同的']]},
      {name:'Level 2 校園補給站', theme:'學校與學習', words:[['dictionary','字典'],['difficult','困難的'],['enough','足夠的'],['example','例子'],['excited','興奮的'],['favorite','最喜愛的'],['finish','完成'],['future','未來'],['grade','年級；成績'],['history','歷史'],['homework','家庭作業'],['important','重要的'],['interest','興趣'],['language','語言'],['library','圖書館']]},
      {name:'Level 3 城市航線', theme:'交通與地點', words:[['airport','機場'],['bridge','橋'],['building','建築物'],['corner','角落；轉角'],['department','部門；科系'],['direction','方向'],['factory','工廠'],['hospital','醫院'],['island','島嶼'],['market','市場'],['museum','博物館'],['neighbor','鄰居'],['restaurant','餐廳'],['station','車站'],['traffic','交通']]},
      {name:'Level 4 身心醫療艙', theme:'身體與健康', words:[['accident','意外事故'],['blood','血液'],['breathe','呼吸'],['cough','咳嗽'],['dentist','牙醫'],['exercise','運動'],['fever','發燒'],['healthy','健康的'],['heart','心臟'],['medicine','藥'],['patient','病人；有耐心的'],['shoulder','肩膀'],['stomach','胃；肚子'],['throat','喉嚨'],['toothache','牙痛']]},
      {name:'Level 5 自然探索艙', theme:'自然與環境', words:[['animal','動物'],['beach','海灘'],['cloud','雲'],['desert','沙漠'],['earth','地球；泥土'],['environment','環境'],['forest','森林'],['insect','昆蟲'],['mountain','山'],['nature','自然'],['ocean','海洋'],['plant','植物；種植'],['river','河流'],['season','季節'],['weather','天氣']]},
      {name:'Level 6 情緒通訊塔', theme:'情緒與人際', words:[['angry','生氣的'],['believe','相信'],['brave','勇敢的'],['comfortable','舒服的'],['consider','考慮'],['discuss','討論'],['encourage','鼓勵'],['friendship','友誼'],['honest','誠實的'],['invite','邀請'],['lonely','孤單的'],['nervous','緊張的'],['polite','有禮貌的'],['promise','承諾'],['respect','尊重']]},
      {name:'Level 7 任務動詞庫', theme:'常用動作', words:[['accept','接受'],['appear','出現'],['collect','收集'],['compare','比較'],['continue','繼續'],['decide','決定'],['develop','發展'],['explain','解釋'],['improve','改善'],['include','包含'],['prepare','準備'],['protect','保護'],['receive','收到'],['remember','記得'],['suggest','建議']]},
      {name:'Level 8 科技研究所', theme:'科技與媒體', words:[['camera','相機'],['computer','電腦'],['engineer','工程師'],['information','資訊'],['Internet','網際網路'],['machine','機器'],['message','訊息'],['program','程式；節目'],['record','記錄'],['robot','機器人'],['screen','螢幕'],['search','搜尋'],['technology','科技'],['video','影片'],['website','網站']]},
      {name:'Level 9 抽象能量場', theme:'抽象概念', words:[['ability','能力'],['advantage','優點'],['choice','選擇'],['culture','文化'],['experience','經驗'],['freedom','自由'],['knowledge','知識'],['memory','記憶'],['opinion','意見'],['purpose','目的'],['reason','理由'],['relationship','關係'],['result','結果'],['society','社會'],['success','成功']]},
      {name:'Level 10 星艦菁英關', theme:'進階整合', words:[['achieve','達成'],['although','雖然'],['challenge','挑戰'],['communicate','溝通'],['confidence','信心'],['creative','有創意的'],['especially','尤其'],['excellent','優秀的'],['imagination','想像力'],['international','國際的'],['opportunity','機會'],['population','人口'],['responsible','負責任的'],['serious','嚴肅的；嚴重的'],['valuable','有價值的']]},
      {name:'Level 11 生活任務站', theme:'生活應用', words:[['apartment','公寓'],['balance','平衡'],['calendar','日曆'],['comfortable','舒服的'],['customer','顧客'],['daily','每日的'],['deliver','遞送'],['downtown','市中心'],['electric','電的'],['empty','空的'],['furniture','家具'],['garbage','垃圾'],['laundry','洗衣物'],['package','包裹'],['quality','品質']]},
      {name:'Level 12 旅行探索艙', theme:'旅遊與世界', words:[['abroad','在國外'],['boarding','登機'],['capital','首都'],['custom','風俗；海關'],['delay','延遲'],['distance','距離'],['foreign','外國的'],['guide','導遊；指引'],['journey','旅程'],['luggage','行李'],['passport','護照'],['platform','月台'],['route','路線'],['sightseeing','觀光'],['souvenir','紀念品']]},
      {name:'Level 13 飲食補給艙', theme:'飲食與消費', words:[['appetite','胃口'],['bitter','苦的'],['cafeteria','自助餐廳'],['delicious','美味的'],['dessert','甜點'],['flavor','風味'],['ingredient','食材'],['menu','菜單'],['nutrition','營養'],['order','點餐；命令'],['receipt','收據'],['recommend','推薦'],['serve','服務；端上'],['spicy','辣的'],['vegetable','蔬菜']]},
      {name:'Level 14 媒體情報局', theme:'資訊與溝通', words:[['advertisement','廣告'],['announce','宣布'],['article','文章'],['audience','觀眾'],['broadcast','廣播'],['channel','頻道'],['comment','評論'],['describe','描述'],['interview','訪問'],['journalist','記者'],['publish','出版'],['reporter','記者'],['signal','訊號'],['source','來源'],['title','標題']]},
      {name:'Level 15 地球守護隊', theme:'環境與公民', words:[['climate','氣候'],['community','社區'],['damage','損害'],['energy','能源'],['garbage','垃圾'],['habit','習慣'],['local','當地的'],['pollution','汙染'],['public','公共的'],['recycle','回收'],['reduce','減少'],['resource','資源'],['reuse','再利用'],['volunteer','志工'],['waste','浪費；廢棄物']]},
      {name:'Level 16 科學實驗艙', theme:'科學與研究', words:[['amount','數量'],['chemical','化學物質'],['conclusion','結論'],['data','資料'],['discover','發現'],['experiment','實驗'],['fact','事實'],['increase','增加'],['instrument','儀器'],['observe','觀察'],['planet','行星'],['pressure','壓力'],['research','研究'],['temperature','溫度'],['theory','理論']]},
      {name:'Level 17 文學劇場艙', theme:'閱讀與表達', words:[['author','作者'],['character','角色'],['chapter','章節'],['dialogue','對話'],['essay','短文'],['fiction','小說'],['grammar','文法'],['meaning','意義'],['paragraph','段落'],['poem','詩'],['pronounce','發音'],['sentence','句子'],['summary','摘要'],['translate','翻譯'],['vocabulary','字彙']]},
      {name:'Level 18 問題解決室', theme:'思考與決策', words:[['analyze','分析'],['avoid','避免'],['cause','原因；造成'],['consequence','後果'],['detail','細節'],['effect','影響；效果'],['evidence','證據'],['focus','專注'],['method','方法'],['option','選項'],['possible','可能的'],['process','過程'],['solution','解決方法'],['strategy','策略'],['support','支持']]},
      {name:'Level 19 未來職涯港', theme:'職業與未來', words:[['application','申請'],['career','職業生涯'],['company','公司'],['contract','合約'],['degree','學位'],['education','教育'],['employee','員工'],['interview','面試'],['manager','經理'],['position','職位'],['professional','專業的'],['salary','薪水'],['skill','技能'],['training','訓練'],['workplace','職場']]},
      {name:'Level 20 銀河統整站', theme:'高階整合', words:[['accurate','精確的'],['attitude','態度'],['benefit','好處'],['complex','複雜的'],['cooperate','合作'],['effective','有效的'],['efficient','有效率的'],['global','全球的'],['impact','影響'],['independent','獨立的'],['influence','影響'],['maintain','維持'],['necessary','必要的'],['positive','正面的'],['significant','重要的']]}
    ];

    const PASS_SCORE = 12;
    const state = { unlocked: Number(localStorage.getItem('juniorMissionUnlocked') || 1), keys: Number(localStorage.getItem('juniorMissionKeys') || 0), level: null, index: 0, score: 0, answered: false, selected: '', advanced: false, pool: [], missed: [], combo: 0, rescueMode: false };
    const $ = id => document.getElementById(id);
    const allWords = LEVELS.flatMap(l => l.words);

    function saveProgress(){
      localStorage.setItem('juniorMissionUnlocked', state.unlocked);
      localStorage.setItem('juniorMissionKeys', state.keys);
      localStorage.removeItem('juniorMissionPoints');
    }
    function saveSession(){
      if (!state.level) return;
      localStorage.setItem('juniorMissionSession', JSON.stringify({
        level: state.level,
        index: state.index,
        score: state.score,
        advanced: state.advanced,
        missed: state.missed,
        combo: state.combo,
        rescueMode: state.rescueMode,
        pool: state.pool
      }));
    }
    function clearSession(){ localStorage.removeItem('juniorMissionSession'); }
    function loadSession(){
      try { return JSON.parse(localStorage.getItem('juniorMissionSession') || 'null'); }
      catch { return null; }
    }
    function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(v=>v[1]); }
    function normalize(s){ return String(s || '').trim().toLowerCase(); }
    function speak(word){ if (!('speechSynthesis' in window)) return; speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(word); u.lang = 'en-US'; u.rate = .85; speechSynthesis.speak(u); }
    let audioCtx;
    function tone(freq, duration = .12, type = 'sine', gain = .06, delay = 0){
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const start = audioCtx.currentTime + delay;
        const osc = audioCtx.createOscillator();
        const vol = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        vol.gain.setValueAtTime(0.0001, start);
        vol.gain.exponentialRampToValueAtTime(gain, start + .02);
        vol.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(vol).connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + duration + .03);
      } catch {}
    }
    function playSound(kind){
      if (kind === 'correct') { tone(660, .11, 'triangle'); tone(880, .13, 'triangle', .05, .09); }
      if (kind === 'wrong') { tone(180, .16, 'sawtooth', .035); tone(140, .16, 'sawtooth', .03, .11); }
      if (kind === 'combo') { tone(880, .1, 'square', .045); tone(1175, .12, 'triangle', .045, .08); }
      if (kind === 'boss') { tone(392, .13, 'triangle', .06); tone(523, .14, 'triangle', .06, .1); tone(784, .22, 'triangle', .07, .22); }
      if (kind === 'start') { tone(330, .1, 'sine', .04); tone(494, .12, 'sine', .04, .08); }
    }

    function renderStatus(){
      $('keyMeter').style.width = `${Math.min(100, state.keys / LEVELS.length * 100)}%`;
      const rank = state.keys >= 20 ? 'Galaxy Commander' : state.keys >= 14 ? 'Word Pilot' : state.keys >= 7 ? 'Key Hunter' : 'Cadet Starter';
      $('rankTitle').textContent = rank;
      $('rankText').textContent = `目前鑰匙：${state.keys} / ${LEVELS.length}，已完成關卡：${state.keys} / ${LEVELS.length}。${state.keys >= 5 ? '進階拼字模式已啟動，可以挑戰更高難度。' : '取得 5 把鑰匙後，會開啟進階拼字模式。'}`;
      $('bossGrid').innerHTML = Array.from({ length: LEVELS.length }, (_, idx) => {
        const defeated = idx < state.keys;
        return `<span class="boss ${defeated ? 'defeated' : ''}" title="${defeated ? '已完成關卡' : '尚未完成關卡'}"><span class="stageNo">${defeated ? '✓' : idx + 1}</span></span>`;
      }).join('');
      $('resumeBtn').style.display = loadSession() ? 'block' : 'none';
    }
    function renderLevels(){
      renderStatus();
      $('levels').innerHTML = LEVELS.map((level, idx) => {
        const n = idx + 1;
        const locked = n > state.unlocked;
        const done = n <= state.keys;
        return `<article class="level ${locked ? 'locked' : ''} ${done ? 'done' : ''}" data-level="${n}">
          <div class="badge"><span class="num">${n}</span><span class="lock">${locked ? '🔒' : done ? '✅' : '🔑'}</span></div>
          <h3>${level.name}</h3>
          <p>${level.theme}｜15 題單字任務</p>
          <div class="keyline">${locked ? '需要上一關鑰匙' : done ? '鑰匙已取得' : '可挑戰'}</div>
        </article>`;
      }).join('');
      document.querySelectorAll('.level').forEach(card => card.addEventListener('click', () => {
        const n = Number(card.dataset.level);
        if (n <= state.unlocked) startLevel(n);
      }));
    }
    function startLevel(n){
      state.level = n;
      state.index = 0;
      state.score = 0;
      state.answered = false;
      state.selected = '';
      state.advanced = state.keys >= 5;
      state.pool = LEVELS[n - 1].words.map(([word, meaning]) => ({word, meaning}));
      state.missed = [];
      state.combo = 0;
      state.rescueMode = false;
      playSound('start');
      saveSession();
      $('game').classList.add('active');
      $('game').scrollIntoView({behavior:'smooth', block:'start'});
      renderQuestion();
    }
    function makeOptions(correct){
      const distractors = shuffle(allWords.filter(([w]) => w !== correct.word)).slice(0, 3).map(([,m]) => m);
      return shuffle([correct.meaning, ...distractors]);
    }
    function renderQuestion(){
      const q = state.pool[state.index];
      state.answered = false;
      state.selected = '';
      $('missionName').textContent = `${LEVELS[state.level - 1].name}`;
      $('modeName').textContent = state.advanced ? '進階拼字模式' : '選擇題模式';
      $('scoreText').textContent = `${state.score} / 15`;
      $('comboText').textContent = state.combo >= 3 ? `🔥 連擊 ${state.combo}` : `連擊 ${state.combo}`;
      $('progressBar').style.width = `${state.index / state.pool.length * 100}%`;
      $('questionNo').textContent = `${state.rescueMode ? '補救' : 'Q'}${state.index + 1} / ${state.pool.length}`;
      $('prompt').textContent = state.advanced ? q.meaning : q.word;
      $('hint').innerHTML = state.advanced ? `請輸入英文單字。提示：共有 <b>${q.word.length}</b> 個字母。` : `選出 <b>${q.word}</b> 的中文意思。`;
      $('feedback').textContent = state.advanced ? '輸入英文後送出，星艦會比對答案。' : '選出正確答案，啟動星艦翻譯核心。';
      $('nextBtn').style.display = 'none';
      $('submitBtn').style.display = state.advanced ? 'inline-block' : 'none';
      if (state.advanced) {
        $('answerArea').innerHTML = `<input id="spellInput" class="inputAnswer" autocomplete="off" placeholder="輸入英文單字，例如: future">`;
        $('spellInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkAdvanced(); });
      } else {
        $('answerArea').innerHTML = `<div class="options">${makeOptions(q).map(opt => `<button class="option" data-answer="${opt}">${opt}</button>`).join('')}</div>`;
        document.querySelectorAll('.option').forEach(btn => btn.addEventListener('click', () => checkChoice(btn)));
      }
    }
    function checkChoice(btn){
      if (state.answered) return;
      const q = state.pool[state.index];
      state.answered = true;
      const ok = btn.dataset.answer === q.meaning;
      if (ok) { state.score++; state.combo++; playSound(state.combo >= 3 ? 'combo' : 'correct'); } else { state.combo = 0; playSound('wrong'); rememberMiss(q, btn.dataset.answer); }
      document.querySelectorAll('.option').forEach(b => {
        if (b.dataset.answer === q.meaning) b.classList.add('correct');
        else if (b === btn) b.classList.add('wrong');
      });
      $('feedback').innerHTML = ok ? `✅ 破解成功：<b>${q.word}</b> = ${q.meaning}${state.combo >= 2 ? '（連擊成功）' : ''}` : `⚠️ 答案是 <b>${q.meaning}</b>。單字：${q.word}`;
      $('scoreText').textContent = `${state.score} / ${state.pool.length}`;
      $('comboText').textContent = state.combo >= 3 ? `🔥 連擊 ${state.combo}` : `連擊 ${state.combo}`;
      $('nextBtn').style.display = 'inline-block';
      saveSession();
    }
    function checkAdvanced(){
      if (state.answered) return;
      const q = state.pool[state.index];
      const input = $('spellInput');
      const ok = normalize(input.value) === normalize(q.word);
      state.answered = true;
      input.disabled = true;
      if (ok) {
        state.score++;
        state.combo++;
        playSound(state.combo >= 3 ? 'combo' : 'correct');
        input.style.borderColor = '#34d399';
        $('feedback').innerHTML = `✅ 拼字正確：<b>${q.word}</b> = ${q.meaning}${state.combo >= 2 ? '（連擊成功）' : ''}`;
      } else {
        state.combo = 0;
        playSound('wrong');
        rememberMiss(q, input.value || '未作答');
        input.style.borderColor = '#fb7185';
        $('feedback').innerHTML = `⚠️ 正確拼字是 <b>${q.word}</b>，意思是 ${q.meaning}`;
      }
      $('scoreText').textContent = `${state.score} / ${state.pool.length}`;
      $('comboText').textContent = state.combo >= 3 ? `🔥 連擊 ${state.combo}` : `連擊 ${state.combo}`;
      $('submitBtn').style.display = 'none';
      $('nextBtn').style.display = 'inline-block';
      saveSession();
    }
    function rememberMiss(q, userAnswer){
      if (state.missed.some(item => item.word === q.word)) return;
      state.missed.push({ word: q.word, meaning: q.meaning, userAnswer });
    }
    function nextQuestion(){
      if (!state.answered) return;
      state.index++;
      saveSession();
      if (state.index >= state.pool.length) finishLevel();
      else renderQuestion();
    }
    function finishLevel(){
      $('progressBar').style.width = '100%';
      const needed = state.rescueMode ? state.pool.length : PASS_SCORE;
      const passed = state.score >= needed;
      if (passed) {
        const justEarned = state.level > state.keys;
        if (justEarned) state.keys = state.level;
        if (state.unlocked < LEVELS.length && state.level === state.unlocked) state.unlocked++;
        if (justEarned) playSound('boss');
        saveProgress();
        clearSession();
        showModal('🔑', '取得能量鑰匙！', `本關成績 ${state.score}/${state.pool.length}。${justEarned ? `第 ${state.level} 關已完成！` : '這關已完成複習任務。'}${state.keys >= 5 ? '進階拼字模式已啟動！' : ''}`);
      } else {
        clearSession();
        showModal('🛡️', '任務還差一點', `本關成績 ${state.score}/${state.pool.length}。需要至少 ${needed} 題正確才能取得鑰匙。可以直接啟動錯題補救任務，或重新挑戰整個關卡。`);
      }
      $('game').classList.remove('active');
      renderLevels();
    }
    function showModal(icon,title,text){
      $('modalIcon').className = 'bigkey';
      $('modalIcon').textContent = icon;
      $('modalTitle').textContent = title;
      $('modalText').textContent = text;
      renderReview();
      $('modal').classList.add('show');
    }
    function reviewText(){
      if (!state.missed.length) return '';
      return [`${LEVELS[state.level - 1].name} 錯題複習清單`, `成績：${state.score}/${state.pool.length}`, ''].concat(
        state.missed.map((item, idx) => `${idx + 1}. ${item.word} = ${item.meaning}（我的答案：${item.userAnswer}）`)
      ).join('\n');
    }
    function renderReview(){
      const hasMissed = state.missed.length > 0;
      $('reviewBox').classList.toggle('show', hasMissed);
      $('reviewText').value = reviewText();
      $('retryWrongBtn').style.display = hasMissed && !state.rescueMode ? 'inline-block' : 'none';
      $('copyStatus').style.display = 'none';
    }
    async function copyReview(){
      const text = $('reviewText').value;
      if (!text) return;
      try { await navigator.clipboard.writeText(text); }
      catch {
        $('reviewText').select();
        document.execCommand('copy');
      }
      $('copyStatus').style.display = 'block';
    }
    function retryWrong(){
      if (!state.missed.length) return;
      $('modal').classList.remove('show');
      state.pool = state.missed.map(({word, meaning}) => ({word, meaning}));
      state.index = 0;
      state.score = 0;
      state.combo = 0;
      state.answered = false;
      state.rescueMode = true;
      state.advanced = false;
      state.missed = [];
      saveSession();
      $('game').classList.add('active');
      $('game').scrollIntoView({behavior:'smooth', block:'start'});
      renderQuestion();
    }
    function retryLevel(){
      if (!state.level) return;
      $('modal').classList.remove('show');
      startLevel(state.level);
    }
    function resetProgress(startAfterReset = false){
      localStorage.removeItem('juniorMissionUnlocked');
      localStorage.removeItem('juniorMissionKeys');
      localStorage.removeItem('juniorMissionSession');
      localStorage.removeItem('juniorMissionPoints');
      state.unlocked = 1;
      state.keys = 0;
      state.level = null;
      state.index = 0;
      state.score = 0;
      state.answered = false;
      state.selected = '';
      state.advanced = false;
      state.pool = [];
      state.missed = [];
      state.combo = 0;
      state.rescueMode = false;
      $('modal').classList.remove('show');
      $('game').classList.remove('active');
      renderLevels();
      if (startAfterReset) startLevel(1);
    }
    function resumeSession(){
      const session = loadSession();
      if (!session) return;
      Object.assign(state, session);
      $('game').classList.add('active');
      $('game').scrollIntoView({behavior:'smooth', block:'start'});
      renderQuestion();
    }
    $('nextBtn').addEventListener('click', nextQuestion);
    $('submitBtn').addEventListener('click', checkAdvanced);
    $('soundBtn').addEventListener('click', () => { if (state.level) speak(state.pool[state.index].word); });
    $('quitBtn').addEventListener('click', () => $('game').classList.remove('active'));
    $('modalBtn').addEventListener('click', () => $('modal').classList.remove('show'));
    $('retryLevelBtn').addEventListener('click', retryLevel);
    $('restartAllBtn').addEventListener('click', () => resetProgress(true));
    $('clearRecordBtn').addEventListener('click', () => resetProgress(false));
    $('copyReviewBtn').addEventListener('click', copyReview);
    $('retryWrongBtn').addEventListener('click', retryWrong);
    $('resumeBtn').addEventListener('click', resumeSession);
    renderLevels();
  </script>
</body>
</html>
