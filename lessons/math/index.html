    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Segoe UI","Noto Sans TC",system-ui,sans-serif;background:radial-gradient(circle at 12% 15%,rgba(239,184,63,.22) 0 4px,transparent 5px),linear-gradient(90deg,rgba(59,121,189,.07) 1px,transparent 1px) 0 0/28px 28px,linear-gradient(rgba(59,121,189,.07) 1px,transparent 1px) 0 0/28px 28px,var(--paper);background-size:100px 100px,28px 28px,28px 28px}a{text-decoration:none;color:inherit}.top{padding:18px clamp(16px,4vw,40px);border-bottom:1px solid var(--line);background:rgba(255,255,255,.92)}.top a{color:var(--blue);font-weight:900}.shell{width:min(1050px,calc(100% - 28px));margin:0 auto;padding:55px 0}.head{text-align:center}.head h1{margin:0;font-size:clamp(40px,7vw,70px);text-shadow:0 5px 0 rgba(239,184,63,.3)}.head p{max-width:700px;margin:14px auto;color:var(--muted);font-size:19px;line-height:1.7;font-weight:650}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:38px}.card{min-height:290px;display:flex;flex-direction:column;justify-content:space-between;padding:28px;border:3px solid var(--accent);border-radius:22px;background:var(--tint);box-shadow:var(--shadow);transition:transform .2s,filter .2s}.card:hover{transform:translateY(-7px) rotate(-1deg);filter:saturate(1.12)}.icon{font-size:78px}.card h2{margin:10px 0 8px;font-size:31px}.card p{color:var(--muted);font-size:17px;line-height:1.65;font-weight:650}.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:15px}.tag{padding:6px 10px;border-radius:999px;color:var(--blue);background:#fff;font-size:13px;font-weight:850}.go{align-self:flex-start;margin-top:20px;padding:10px 16px;border-radius:999px;color:#fff;background:var(--accent);font-weight:900}@media(max-width:700px){.grid{grid-template-columns:1fr}}
  </style>
</head>
